id: "01_corridor_crossing"
name: "Corridor Crossing"
version: "1.0.0"
category: "standard"
difficulty: "easy"

duration_seconds: 180
dt_seconds: 1.0

airspace:
  bounds_m:
    x: [0, 1000]
    y: [0, 1000]
    z: [50, 200]
  volume_m3: 150_000_000
  capacity_max_agents: 10

agents:
  count: 4
  kinematics:
    max_speed_m_s: 15.0
    max_accel_m_s2: 5.0
    turn_rate_deg_s: 30.0
  spawn_pattern: "two_streams"          # 2 from west, 2 from east
  goal_pattern: "swap_endpoints"        # west↔east

obstacles:
  static: []
  dynamic: []

weather:
  wind: { mean_m_s: 0.0, gust_m_s: 0.0, direction_deg: 0.0 }
  visibility_m: 10000
  precipitation_mm_per_h: 0.0

communications:
  quality: "perfect"
  packet_loss: 0.0
  blackout_windows_s: []

regulatory:
  remote_id_required: true
  laanc_volume_class: "G"
  geofences: []

success_criteria:
  NMR_max: 1.0e-4
  MSD_min_m: 5.0
  geofence_violations_max: 0
  RID_CR_min: 0.999

expected_baseline_performance:           # SDACS hybrid
  NMR: 0.0
  MSD_m: 12.0
  PE: 0.96
  MS_s: 78.0
  RTF: 14.0
