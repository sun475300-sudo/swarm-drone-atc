category: "제도 일반"
category_id: "general_system"
law_references:
  - "관세법 제190조"
  - "보세전시장 운영에 관한 고시 (관세청고시 제2026-15호)"

entries:
  - id: "general_001"
    question: "보세전시장이 무엇인가요?"
    keywords: ["보세전시장", "무엇", "뜻", "의미", "개념", "정의", "제도", "보세구역", "일반", "제도 일반", "알려"]
    answer: |
      보세전시장은 박람회, 전람회, 견본품 전시회 등의 운영을 위해 외국물품을 장치·전시·사용할 수 있는 보세구역입니다.
      일반 창고나 일반 행사장과는 달리, 전시 목적의 외국물품을 일정한 통제 아래 둘 수 있는 특별한 제도입니다.

      주요 특징:
      1. 외국물품을 수입신고 없이 전시 목적으로 장치할 수 있습니다.
      2. 박람회·전람회·견본품 전시회 등 특정 행사를 위해 운영됩니다.
      3. 세관장의 특허를 받아 설치·운영합니다.
      4. 물품의 반입·반출·전시·판매 등에 대해 세관의 관리·감독을 받습니다.
    law_basis: "관세법 제190조"
    related: ["general_002", "permit_001"]

  - id: "general_002"
    question: "보세전시장에서 할 수 있는 것과 할 수 없는 것은 무엇인가요?"
    keywords: ["할 수 있는", "가능", "불가", "허용", "금지", "제한", "범위"]
    answer: |
      [할 수 있는 것]
      1. 외국물품의 장치·전시·사용 (관세법 제190조)
      2. 세관장 허가를 받은 견본품 반출 (관세법 제161조)
      3. 수입신고 및 통관 후 물품 판매·인도

      [할 수 없는 것 / 제한되는 것]
      1. 판매용 외국물품의 수입면허 전 사용 금지 (관세법 시행령 제101조)
      2. 직매된 전시용 외국물품의 통관 전 반출(인도) 금지 (관세법 시행령 제102조)
      3. 세관장 허가 없는 견본품 반출 금지 (관세법 제161조)
      4. 반출입신고 없이 물품을 반입·반출하는 행위

      구체적인 물품 성질, 반입 목적, 판매 여부, 행사 방식에 따라 달라질 수 있습니다.
    law_basis: "관세법 제190조, 관세법 시행령 제101조·제102조, 관세법 제161조"
    related: ["general_001", "sales_001", "import_export_003"]

  - id: "general_003"
    question: "보세전시장과 보세창고는 어떻게 다른가요?"
    keywords: ["보세창고", "차이", "다른", "비교", "구분", "종류"]
    answer: |
      보세전시장과 보세창고는 모두 보세구역이지만 목적이 다릅니다.

      1. 보세전시장: 박람회·전람회·견본품 전시회 등 전시 목적의 외국물품 장치·전시·사용 (관세법 제190조)
      2. 보세창고: 외국물품이나 통관을 하려는 물품을 장치하기 위한 구역 (관세법 제183조)

      보세전시장은 행사 기간 중심으로 특허기간이 설정되며, 보세창고는 장기 장치를 목적으로 합니다.
    law_basis: "관세법 제183조, 관세법 제190조"
    related: ["general_001"]

  - id: "general_004"
    question: "보세전시장 관련 문의는 어디에 하나요?"
    keywords: ["문의", "연락처", "전화", "상담", "담당", "부서", "어디"]
    answer: |
      보세전시장 관련 문의처는 다음과 같습니다.

      1. 제도 일반 상담: 관세청 고객지원센터 (☎ 125)
      2. 보세전시장 제도 소관: 관세청 통관국 보세산업과
      3. 전자통관 시스템(UNI-PASS) 문의: 관세청 전자통관 기술지원센터 (☎ 1544-1285)
      4. 개별 사안: 관할 세관 보세담당 부서

      유권해석, 처분 예고, 불복절차 판단 등 법적 책임이 큰 사안은 관할 세관 또는 관세청 담당부서 확인이 필요합니다.
    law_basis: "관세청 홈페이지 안내"
    related: []

  - id: "general_005"
    question: "보세전시장에서 전시하려면 어떤 절차를 거쳐야 하나요?"
    keywords: ["절차", "과정", "순서", "단계", "어떻게", "방법", "전체"]
    answer: |
      보세전시장 전시 절차는 일반적으로 다음과 같습니다.

      1. 보세전시장 특허 신청 및 취득 (운영에 관한 고시 제6조)
      2. 전시물품 반입신고 (운영에 관한 고시 제10조)
      3. 세관공무원의 물품검사 (운영에 관한 고시 제11조)
      4. 물품 장치·전시·사용
      5. 행사 종료 후 물품 반출신고
         - 재반출(수출): 수출신고
         - 국내 판매: 수입신고 및 통관 후 인도
         - 견본품 반출: 세관장 허가 (관세법 제161조)

      구체적인 절차는 행사 성격과 물품 종류에 따라 달라질 수 있으므로 관할 세관과 사전 협의하는 것이 안전합니다.
    law_basis: "보세전시장 운영에 관한 고시 제6조·제10조·제11조, 관세법 제161조"
    related: ["permit_001", "import_export_001"]
