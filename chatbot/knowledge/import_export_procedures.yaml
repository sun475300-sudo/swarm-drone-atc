category: "반입/반출"
category_id: "import_export_procedures"
law_references:
  - "관세법 제161조"
  - "보세전시장 운영에 관한 고시 제10조"
  - "보세전시장 운영에 관한 고시 제11조"

entries:
  - id: "import_export_001"
    question: "보세전시장에 물품을 반입하거나 반출하려면 신고가 필요한가요?"
    keywords: ["반입", "반출", "신고", "반출입", "반출입신고", "들여오", "가져오", "내보내"]
    answer: |
      네. 보세전시장 운영에 관한 고시 제10조에 따르면, 보세전시장에 물품을 반출입하려는 자는 세관장에게 반출입신고를 해야 합니다.

      반입 절차:
      1. 세관장에게 반입신고
      2. 물품을 보세전시장에 반입
      3. 세관공무원의 물품검사 (고시 제11조)

      반출 절차:
      1. 행사 종료 후 반출신고
      2. 재반출(수출)의 경우: 수출신고
      3. 국내 판매의 경우: 수입신고 및 통관 후 인도

      반입신고된 외국물품이 보세전시장에 반입된 경우, 운영인은 세관공무원의 검사를 받아야 합니다.
    law_basis: "보세전시장 운영에 관한 고시 제10조(반출입의 신고), 제11조(물품검사)"
    related: ["import_export_002", "import_export_003"]

  - id: "import_export_002"
    question: "반입신고 후 물품검사는 어떻게 진행되나요?"
    keywords: ["물품검사", "검사", "세관검사", "확인", "검수"]
    answer: |
      보세전시장 운영에 관한 고시 제11조에 따르면, 반입신고된 외국물품이 보세전시장에 반입된 경우 운영인은 세관공무원의 검사를 받아야 합니다.

      검사 관련 사항:
      1. 반입신고된 물품과 실제 반입 물품의 일치 여부 확인
      2. 세관공무원이 검사를 실시
      3. 운영인은 검사에 협조해야 합니다

      구체적인 검사 방법과 범위는 물품의 성질과 수량에 따라 달라질 수 있습니다.
    law_basis: "보세전시장 운영에 관한 고시 제11조(물품검사)"
    related: ["import_export_001"]

  - id: "import_export_003"
    question: "견본품을 보세전시장 밖으로 반출할 수 있나요?"
    keywords: ["견본품", "반출", "샘플", "홍보용", "견본", "밖으로", "가져가"]
    answer: |
      보세구역에 장치된 외국물품의 전부 또는 일부를 견본품으로 반출하려면 세관장의 허가가 필요합니다.

      주요 사항:
      1. "홍보용 샘플"이라도 자동 허용이 아닙니다.
      2. 견본품 반출 허가를 세관장에게 신청해야 합니다.
      3. 세관장은 신청일부터 10일 이내에 허가 여부를 통지해야 합니다.
      4. 허가 없이 견본품을 반출하면 관세법 위반에 해당할 수 있습니다.

      구체적인 물품 성질, 반입 목적, 판매 여부에 따라 달라질 수 있으므로 관할 세관에 확인하시기 바랍니다.
    law_basis: "관세법 제161조(견본품의 반출)"
    related: ["import_export_001"]

  - id: "import_export_004"
    question: "보세전시장 행사 종료 후 물품은 어떻게 처리하나요?"
    keywords: ["행사 종료", "종료 후", "처리", "잔여", "남은", "끝난 후"]
    answer: |
      보세전시장 행사 종료 후 물품 처리 방법은 다음과 같습니다.

      1. 재반출(수출): 외국으로 다시 반출하는 경우 수출신고 후 반출
      2. 국내 판매: 수입신고 및 통관(관세 납부) 후 국내 인도
      3. 폐기: 세관장 승인 하에 폐기 가능
      4. 타 보세구역 이송: 다른 보세구역으로 이송하는 경우 보세운송 절차 진행

      특허기간 내에 물품 처리를 완료해야 하며, 정리기간이 특허기간에 포함됩니다.
      구체적인 처리 절차는 관할 세관과 협의가 필요합니다.
    law_basis: "보세전시장 운영에 관한 고시, 관세법 제190조"
    related: ["import_export_001", "sales_001"]

  - id: "import_export_005"
    question: "반출입신고를 하지 않으면 어떻게 되나요?"
    keywords: ["신고 안 하면", "미신고", "위반", "벌칙", "처벌", "과태료"]
    answer: |
      보세전시장에 반출입신고를 하지 않고 물품을 반입·반출하는 것은 관세법 위반에 해당할 수 있습니다.

      가능한 제재:
      1. 관세법상 벌칙 적용 가능
      2. 특허 취소 또는 정지 사유가 될 수 있음
      3. 과태료 부과 가능

      구체적인 제재 내용은 위반의 정도와 사안에 따라 달라지므로, 반드시 정해진 절차에 따라 반출입신고를 하시기 바랍니다.

      안내: 벌칙·제재에 관한 구체적 판단은 관할 세관 또는 관세청 담당부서 확인이 필요합니다.
    law_basis: "관세법, 보세전시장 운영에 관한 고시 제10조"
    related: ["import_export_001"]
