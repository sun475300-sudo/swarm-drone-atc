category: "보수작업"
category_id: "maintenance_scope"
law_references:
  - "관세법"
  - "보세전시장 운영에 관한 고시 (관세청고시 제2026-15호)"

entries:
  - id: "maintenance_001"
    question: "보세전시장에서 보수작업은 어떤 범위까지 가능한가요?"
    keywords: ["보수작업", "보수", "수리", "수선", "범위", "유지보수", "작업"]
    answer: |
      보세전시장에서의 보수작업은 물품의 본질적 성질을 변경하지 않는 범위 내에서 허용됩니다.

      허용되는 보수작업 (일반적 범위):
      1. 물품의 보존을 위한 작업 (부패·손상 방지)
      2. 간단한 포장 개선
      3. 라벨 부착·표시 작업
      4. 간단한 절단 작업
      5. 전시를 위한 조립·설치 작업

      금지되는 작업:
      1. 물품의 본질적 성질을 변경하는 가공·제조
      2. 새로운 제품을 만들어내는 작업
      3. 물품의 본래 용도를 변경하는 작업

      보수작업 전 세관의 승인이 필요하며, 구체적인 작업 범위는 관할 세관에 확인하시기 바랍니다.
    law_basis: "관세법, 보세전시장 운영에 관한 고시"
    related: ["maintenance_002"]

  - id: "maintenance_002"
    question: "보세전시장 시설(건물) 보수는 가능한가요?"
    keywords: ["시설", "건물", "시설보수", "건물보수", "수리", "페인트", "공사"]
    answer: |
      보세전시장 시설(건물)의 유지·보수는 가능합니다.

      허용되는 시설 보수:
      1. 전시장 건물의 유지·보수
      2. 사무실·창고 시설 수리
      3. 구조물의 기본 보수 (도색, 접착, 볼트 체결, 합판 보수 등)
      4. 전시 부스 설치·철거

      다만:
      - 시설의 본질적 구조를 변경하는 대규모 공사는 별도 협의 필요
      - 보수작업이 다른 보세화물 관리에 지장을 주어서는 안 됩니다
      - 세관 관리·감독에 영향을 미치는 변경은 사전 승인 필요

      구체적인 사안은 관할 세관에 확인하시기 바랍니다.
    law_basis: "보세전시장 운영에 관한 고시"
    related: ["maintenance_001"]

  - id: "maintenance_003"
    question: "전시물품의 간단한 수선이나 라벨 부착도 허가가 필요한가요?"
    keywords: ["라벨", "부착", "수선", "간단한", "허가", "승인", "필요"]
    answer: |
      보수작업의 범위에 해당하는 간단한 수선이나 라벨 부착은 일반적으로 가능하나, 세관에 사전 통보 또는 승인이 필요할 수 있습니다.

      일반적으로 허용되는 범위:
      1. 라벨·표시 부착
      2. 간단한 포장 개선
      3. 물품 보존을 위한 간단한 수선

      주의사항:
      - 보수작업 전 세관에 통보하는 것이 안전합니다.
      - 물품의 성질이나 형태가 변경되는 경우 별도 승인 필요
      - 작업 내용과 결과를 기록·보관하는 것이 바람직합니다.

      구체적인 사안은 관할 세관에 확인하시기 바랍니다.
    law_basis: "보세전시장 운영에 관한 고시"
    related: ["maintenance_001"]
