category: "특허/운영"
category_id: "permit_requirements"
law_references:
  - "관세법 제174조"
  - "관세법 제176조"
  - "보세전시장 운영에 관한 고시 (관세청고시 제2026-15호)"

entries:
  - id: "permit_001"
    question: "보세전시장 설치·운영 특허를 받으려면 어떻게 해야 하나요?"
    keywords: ["특허", "설치", "운영", "신청", "허가", "설영", "설영특허", "받으려면"]
    answer: |
      보세전시장 운영에 관한 고시에는 특허장소, 특허신청 관련 규정이 있으며, 보세전시장으로 특허받을 수 있는 장소와 신청 절차가 규정되어 있습니다.

      기본 절차:
      1. 관할 세관에 보세전시장 특허 신청
      2. 특허장소 요건 충족 확인 (고시 제4조)
      3. 특허신청 서류 제출 (고시 제6조)
      4. 세관 심사 및 특허 부여

      실제 신청인은 행사 장소, 운영 계획, 반입 예정 물품, 관리 체계 등을 기준으로 관할 세관과 사전협의하는 것이 안전합니다.
    law_basis: "보세전시장 운영에 관한 고시 제4조(특허장소), 제6조(특허신청)"
    related: ["permit_002", "permit_003"]

  - id: "permit_002"
    question: "보세전시장 특허를 받을 수 있는 장소 요건은 무엇인가요?"
    keywords: ["장소", "요건", "조건", "시설", "장소요건", "특허장소", "어디"]
    answer: |
      보세전시장 운영에 관한 고시 제4조에 따라 보세전시장으로 특허받을 수 있는 장소의 요건이 규정되어 있습니다.

      일반적으로 다음 사항이 고려됩니다:
      1. 박람회·전람회·견본품 전시회 등의 행사장으로 적합한 장소
      2. 외국물품의 장치·전시·관리가 가능한 시설
      3. 세관의 관리·감독이 가능한 구조

      구체적인 장소 요건은 행사 성격과 규모에 따라 달라질 수 있으므로, 관할 세관과 사전 협의가 필요합니다.
    law_basis: "보세전시장 운영에 관한 고시 제4조(특허장소)"
    related: ["permit_001", "permit_003"]

  - id: "permit_003"
    question: "보세전시장 특허기간은 어떻게 되나요?"
    keywords: ["특허기간", "기간", "얼마나", "언제까지", "회기", "준비기간", "정리기간"]
    answer: |
      보세전시장 운영에 관한 고시 제5조에 따르면, 보세전시장의 특허기간은 해당 박람회 등의 회기와 그 회기의 전후 준비·정리기간을 기준으로 정해집니다.

      주요 사항:
      1. 행사 회기(개최 기간)가 기본이 됩니다.
      2. 회기 전 준비기간이 포함됩니다.
      3. 회기 후 정리기간이 포함됩니다.
      4. 상시 장기 운영이 아닌 행사 중심의 기간 설정입니다.

      정확한 기간 산정은 행사 일정과 신청 내용에 따라 관할 세관 심사를 받게 됩니다.
    law_basis: "보세전시장 운영에 관한 고시 제5조(특허기간)"
    related: ["permit_001"]

  - id: "permit_004"
    question: "보세전시장 특허 신청 시 필요한 서류는 무엇인가요?"
    keywords: ["서류", "구비서류", "신청서류", "제출", "서류목록", "필요서류"]
    answer: |
      보세전시장 운영에 관한 고시 제6조에 따라 특허신청 시 필요한 서류가 규정되어 있습니다.

      일반적으로 필요한 사항:
      1. 보세전시장 특허신청서
      2. 행사 운영 계획서
      3. 장소 관련 서류(임대차계약서 등)
      4. 물품 관리 계획
      5. 운영인 관련 서류

      구체적인 서류 목록은 행사 성격과 관할 세관에 따라 다를 수 있으므로, 신청 전 관할 세관에 확인하시기 바랍니다.

      안내: 본 답변은 일반적인 안내용 설명이며, 법령에 없는 서류를 임의로 안내할 수 없습니다. 최종 서류 목록은 관할 세관 확인이 필요합니다.
    law_basis: "보세전시장 운영에 관한 고시 제6조(특허신청)"
    related: ["permit_001", "permit_002"]

  - id: "permit_005"
    question: "보세전시장 운영인의 의무는 무엇인가요?"
    keywords: ["운영인", "의무", "책임", "관리", "운영자", "해야 할"]
    answer: |
      보세전시장 운영인은 다음과 같은 의무를 부담합니다.

      1. 물품의 반출입신고 관리 (고시 제10조)
      2. 세관공무원의 물품검사 협조 (고시 제11조)
      3. 장치물품에 대한 관리·감독 책임
      4. 특허 조건 준수
      5. 세관의 지시사항 이행

      운영인은 보세전시장에 장치된 외국물품에 대한 관리 책임을 지므로, 물품의 분실·도난·훼손 등에 주의해야 합니다.
    law_basis: "보세전시장 운영에 관한 고시, 관세법 제190조"
    related: ["permit_001"]
