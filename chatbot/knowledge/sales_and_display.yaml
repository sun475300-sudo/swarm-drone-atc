category: "판매/전시/시식"
category_id: "sales_and_display"
law_references:
  - "관세법 제190조"
  - "관세법 시행령 제101조"
  - "관세법 시행령 제102조"
  - "관세법 제226조"

entries:
  - id: "sales_001"
    question: "보세전시장에 전시한 물품을 현장에서 바로 판매할 수 있나요?"
    keywords: ["판매", "현장판매", "직매", "바로 팔", "팔 수", "판매 가능", "살 수"]
    answer: |
      현장 판매 자체를 검토할 수는 있지만, 통관 전 자유롭게 인도할 수 있는 것은 아닙니다.

      관세법 시행령 규정:
      1. 판매용 외국물품은 수입면허를 받기 전에는 사용할 수 없습니다. (시행령 제101조)
      2. 전시용 외국물품을 현장에서 직매하는 경우에도 수입면허를 받기 전에는 인도할 수 없습니다. (시행령 제102조)

      즉, "전시"와 "국내 반출·인도"는 별도로 보셔야 합니다.
      - 전시: 보세전시장 내에서 가능
      - 판매 계약: 체결 가능
      - 물품 인도: 반드시 수입신고·통관 완료 후에만 가능

      구체적인 물품 성질, 반입 목적, 판매 여부, 행사 방식에 따라 달라질 수 있습니다.
    law_basis: "관세법 시행령 제101조(판매용품의 면허전 사용금지), 제102조(직매된 전시용품의 통관전 반출금지)"
    related: ["sales_002", "sales_003"]

  - id: "sales_002"
    question: "판매용 외국물품의 수입면허 전 사용이 왜 금지되나요?"
    keywords: ["면허전", "사용금지", "왜", "이유", "판매용", "수입면허"]
    answer: |
      관세법 시행령 제101조에 따라 보세전시장에 장치된 판매용 외국물품은 수입면허를 받기 전에는 사용할 수 없습니다.

      이유:
      1. 외국물품에 대한 관세·부가세 등 세금이 아직 납부되지 않은 상태
      2. 수입요건(식품위생, 안전기준 등) 확인이 완료되지 않은 상태
      3. 국내법상 유통 허가를 받지 않은 상태

      따라서 판매·사용을 위해서는 반드시 수입신고 후 면허(수리)를 받아야 합니다.
    law_basis: "관세법 시행령 제101조(판매용품의 면허전 사용금지)"
    related: ["sales_001"]

  - id: "sales_003"
    question: "직매된 전시용품의 통관 전 반출이 왜 금지되나요?"
    keywords: ["직매", "통관전", "반출금지", "인도", "전시용품"]
    answer: |
      관세법 시행령 제102조에 따라, 보세전시장에서 전시용 외국물품을 현장에서 직매(직접 판매)한 경우에도 수입면허를 받기 전에는 그 물품을 인도(반출)할 수 없습니다.

      이는 다음을 보장하기 위한 것입니다:
      1. 관세 등 세금의 적정 부과·징수
      2. 수입요건 확인 완료
      3. 국내 유통 적법성 확보

      현장에서 구매 계약을 체결하더라도, 물품 인도는 수입통관이 완료된 후에야 가능합니다.
    law_basis: "관세법 시행령 제102조(직매된 전시용품의 통관전 반출금지)"
    related: ["sales_001"]

  - id: "sales_004"
    question: "시식용 식품을 보세전시장에 들여오는 경우 요건확인(세관장확인)은 생략되나요?"
    keywords: ["시식", "식품", "요건확인", "세관장확인", "식품안전", "생략", "면제", "시식용"]
    answer: |
      원칙적으로 수입식품은 세관장확인 생략이 불가합니다.

      다만 관세청 FAQ에 따르면:
      1. 수입식품안전관리특별법 시행규칙 별표 9 제1호 등에 해당하는 일부 식품은 예외가 있을 수 있습니다.
      2. 보세전시장 운영자가 박람회 등 행사에서 홍보 및 시식용으로 사용하기 위해 전시용품 또는 증여물품으로 반입신고하는 수입식품 등에 관한 예외 규정이 있습니다.

      중요 사항:
      - 식약처 요건까지 함께 확인해야 합니다.
      - 개별 식품의 성질, 용도, 수량에 따라 결과가 달라질 수 있습니다.
      - 구체적인 사안은 관할 세관 및 식약처에 확인이 필요합니다.

      안내: 시식용 식품, 검역, 식약처 협업 사안은 관계기관 요건도 함께 확인해야 합니다.
    law_basis: "관세법 제226조, 관세청 고객지원센터 FAQ"
    related: ["sales_001"]

  - id: "sales_005"
    question: "보세전시장에서 증정(무료 배포)은 가능한가요?"
    keywords: ["증정", "무료", "배포", "나눠주", "공짜", "무상"]
    answer: |
      보세전시장에서의 증정(무상 배포)도 물품의 국내 반출에 해당할 수 있으므로 주의가 필요합니다.

      1. 전시 목적의 사용(진열·시연 등)은 보세전시장 내에서 가능합니다.
      2. 그러나 물품을 방문객에게 인도(증정 포함)하는 것은 국내 반출에 해당할 수 있습니다.
      3. 견본품으로 반출하려면 세관장의 허가가 필요합니다. (관세법 제161조)
      4. 시식용 식품의 경우 별도의 요건확인이 필요합니다.

      구체적인 물품 성질, 증정 목적, 수량에 따라 달라질 수 있으므로 관할 세관에 확인하시기 바랍니다.
    law_basis: "관세법 제161조, 관세법 시행령 제101조·제102조"
    related: ["import_export_003", "sales_004"]

  - id: "sales_006"
    question: "보세전시장에서 외국물품을 사용(시연, 데모)할 수 있나요?"
    keywords: ["사용", "시연", "데모", "시범", "작동", "사용할 수"]
    answer: |
      관세법 제190조에 따르면 보세전시장은 외국물품을 장치·전시·사용할 수 있는 곳입니다.

      따라서 전시 목적의 시연(데모)은 가능합니다:
      1. 제품 작동 시연
      2. 기능 시범 운영
      3. 전시 목적의 사용

      다만 다음에 해당하면 별도 절차가 필요합니다:
      - 시연 후 물품이 소모되는 경우 (수입통관 필요 여부 검토)
      - 시연 결과물을 배포하는 경우 (견본품 반출 허가 등)
      - 판매 목적의 시연인 경우 (시행령 제101조 적용 가능)

      구체적인 사안은 관할 세관에 확인하시기 바랍니다.
    law_basis: "관세법 제190조"
    related: ["sales_001", "sales_005"]
