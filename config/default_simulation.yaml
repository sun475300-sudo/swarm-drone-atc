# 군집드론 공역통제 시뮬레이션 기본 설정

simulation:
  seed: 42
  duration_minutes: 10
  time_step_hz: 10        # 시뮬레이션 틱 (10Hz)
  control_hz: 1           # 공역 컨트롤러 틱 (1Hz)
  real_time_factor: 0     # 0 = 최대속도, 1.0 = 실시간

airspace:
  bounds_km:
    x: [-5.0, 5.0]        # East-West (km)
    y: [-5.0, 5.0]        # North-South (km)
    z: [0.0, 0.12]        # Altitude AGL (km) → 120m
  area_km2: 100
  home:
    lat: 35.1595           # 광주광역시 기준
    lon: 126.8526
    alt_m: 30.0

separation_standards:
  lateral_min_m: 50.0
  vertical_min_m: 15.0
  near_miss_lateral_m: 10.0
  near_miss_vertical_m: 3.0
  conflict_lookahead_s: 90.0

drones:
  default_count: 100
  max_speed_ms: 15.0
  cruise_speed_ms: 8.0
  max_altitude_m: 120.0
  min_altitude_m: 30.0
  battery_capacity_wh: 50.0
  comm_range_m: 2000.0

controller:
  max_concurrent_clearances: 500
  clearance_timeout_s: 300.0
  advisory_retry_limit: 3

logging:
  level: INFO
  save_trajectory: true
  save_events: true
  output_dir: data/results
