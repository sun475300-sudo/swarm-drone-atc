# Monte Carlo 파라미터 스윕 설정

master_seed: 42

# 시뮬레이션 공통 설정
simulation:
  duration_s: 600.0      # 시뮬레이션 시간 (초) — 각 스윕에서 override 가능

# 전체 스윕 (38,400회, 16코어 ~3.3시간)
full_sweep:
  duration_s: 600.0      # 전체 스윕: 10분
  drone_density: [50, 100, 250, 500]      # 4 levels
  area_size_km2: [25, 100]               # 2 levels
  failure_rate_pct: [0, 1, 5, 10]        # 4 levels
  comms_loss_rate: [0.0, 0.01, 0.05]     # 3 levels
  wind_speed_ms: [0, 5, 15, 25]          # 4 levels
  n_per_config: 100
  # total_configs: 384 (4x2x4x3x4)
  # total_runs: 38,400

# 빠른 스윕 (개발용, 960회, 16코어 ~4분)
quick_sweep:
  duration_s: 120.0      # 빠른 스윕: 2분
  drone_density: [50, 250]
  area_size_km2: [100]
  failure_rate_pct: [0, 5]
  comms_loss_rate: [0.0, 0.05]
  wind_speed_ms: [0, 15]
  n_per_config: 30
  # total_configs: 32 (2x1x2x2x2)
  # total_runs: 960

# 병렬 실행 설정
parallel:
  n_workers: -1           # -1 = 모든 코어 사용
  backend: loky           # joblib 백엔드
  batch_size: 100         # 워커당 배치 크기

# 결과 저장
output:
  format: parquet         # 또는 csv
  directory: data/results
  compress: true

# 수락 기준 (SLA)
acceptance_thresholds:
  collision_rate_per_1000h: 0.0        # 하드 요구사항
  near_miss_rate_per_100h: 0.1
  conflict_resolution_rate_pct: 99.5
  route_efficiency_max: 1.15
  controller_throughput_min_per_h: 500
  emergency_response_p50_s: 2.0
  emergency_response_p99_s: 10.0
  intrusion_detection_p90_s: 5.0
