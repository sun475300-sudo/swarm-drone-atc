scenario: s04_route_conflict_resolution
description: "경로 충돌 해소 시나리오 — TCAS-like 알고리즘 정확성"

conflict_geometries:
  - type: head_on
    count: 100
    noise_std_m: 2.0
  - type: crossing_90deg
    count: 100
    noise_std_m: 2.0
  - type: overtake
    count: 100
    noise_std_m: 2.0
  - type: converging_multi
    count: 100
    noise_std_m: 2.0

separation_at_start_m: 200.0
closing_speed_ms: 10.0
simulation_duration_s: 120
