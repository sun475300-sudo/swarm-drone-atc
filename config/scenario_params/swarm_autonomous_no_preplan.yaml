scenario: s09_swarm_autonomous_no_preplan
description: >-
  자율 군집 비행 — 사전 경로 계획 없이 자율 탐색·회피.
  영상 참조: youtube.com/shorts/UJP5GbvlpZs (StudioHey, 2022-05-16,
  "경로를 미리 정해두지 않아도 본인이 갈 길을 잘만 찾아간다").
  SDACS 의 핵심 차별점(Layer 1-3 분산 자율) 명시 데모 시나리오.

drone_count: 20
simulation_duration_min: 5
arrival_rate_per_min: 6           # 낮은 도착률로 군집 형태 유지에 집중
area_km2: 25                      # 5x5 km 박스

drone_profile_distribution:
  COMMERCIAL_DELIVERY: 0.5
  SURVEILLANCE: 0.4
  EMERGENCY: 0.1

route_generation:
  type: random_od                 # 사전 경로 없이 OD 만 random — 모든 회피는 런타임
  min_distance_km: 0.8
  max_distance_km: 4.0

# 군집 비행 강조 옵션 — 본 시나리오는 분산 자율을 검증하므로
# 사전 path planning 단계의 cost 를 시각화/분석에서 제외하기 위한 표지.
formation:
  enabled: true
  pattern: DIAMOND                # 영상 컨셉 ("외곽 확장형 4방향")
  leader_count: 4
  followers_per_leader: 4
  spacing_m: 80
  break_on_threat_m: 50

success_criteria:
  collision_count: 0
  conflict_resolution_rate_min: 0.98
  route_efficiency_max: 1.20      # 자율 탐색이라 사전 계획 시나리오보다 살짝 완화
  formation_break_count_max: 8    # 위협 회피 중 일시적 편대 해제 허용

# 비고 — 본 시나리오는 영상 컨셉을 명시하기 위한 데모이며,
# 기존 high_density.yaml 대비:
#   * drone_count 20 → 군집 형태 시각적으로 식별 가능한 규모
#   * formation.* 키 추가 → simulator/visualizer 가 인식하면 편대 강조 렌더
#   * formation_break_count_max → 자율 회피 사용 횟수 추적 KPI
