scenario: s06_weather_disturbance
description: "기상 교란 시나리오 — 바람 하 경로 추적 강건성"

base_traffic:
  drone_count: 30

weather:
  wind_models:
    - type: constant
      speed_ms: 5.0
      direction_deg: 270
    - type: variable
      mean_speed_ms: 6.0
      direction_deg: 90
      gust_speed_ms: 7.0
      gust_duration_s: 5.0
    - type: shear
      low_alt_speed_ms: 3.0
      high_alt_speed_ms: 8.0
      direction_deg: 0.0
      transition_alt_m: 60.0

# 강풍 조건에서 충돌 예측 기준 강화 (조기 어드바이저리 발령)
separation_standards:
  lateral_min_m: 80.0
  conflict_lookahead_s: 120.0

simulation_duration_s: 600
