version: '3.9'

services:
  sdacs:
    build:
      context: .
      dockerfile: Dockerfile
    image: sdacs:latest
    container_name: sdacs
    ports:
      - "8050:8050"
    volumes:
      - ./config:/app/config:ro
      - ./results:/app/results
    environment:
      - PYTHONIOENCODING=utf-8
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
