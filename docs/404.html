<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>페이지를 찾을 수 없습니다 · SDACS</title>
  <meta name="description" content="요청하신 페이지가 존재하지 않습니다. SDACS 주요 자원으로 바로 이동하세요." />
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="canonical" href="https://sun475300-sudo.github.io/swarm-drone-atc/404.html" />

  <style>
    :root {
      --bg: #05080f;
      --panel: #0e1420;
      --accent: #60a5fa;
      --accent-dim: #3b82d9;
      --text: #e6ebf5;
      --muted: #8a93a6;
      --border: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: radial-gradient(circle at 20% 10%, rgba(59,130,217,0.18), transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(167,139,250,0.12), transparent 50%),
                  var(--bg);
      color: var(--text);
      font-family: 'Pretendard', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      word-break: keep-all;
      padding: 40px 20px;
    }
    .wrap {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }
    .big {
      font-size: clamp(72px, 18vw, 140px);
      font-weight: 900;
      letter-spacing: -4px;
      background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
      margin-bottom: 10px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    p.lead {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
      line-height: 1.7;
    }
    p.lead code {
      background: rgba(96,165,250,0.12);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'SF Mono', 'Consolas', monospace;
    }
    .links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }
    .link {
      display: block;
      padding: 14px 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.15s, border-color 0.15s, background 0.15s;
    }
    .link:hover, .link:focus-visible {
      transform: translateY(-1px);
      border-color: var(--accent);
      background: #121a2a;
      outline: none;
    }
    .link .icon {
      display: block;
      font-size: 20px;
      margin-bottom: 4px;
    }
    .link .sub {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    footer {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.8;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    .path {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-family: monospace;
      font-size: 12px;
      color: var(--muted);
      margin: 16px auto 24px;
      max-width: 100%;
      overflow-wrap: break-word;
    }
    .path strong { color: var(--accent); }
  </style>
</head>
<body>
  <main class="wrap" role="main">
    <div class="big" aria-hidden="true">404</div>
    <h1>경로를 찾을 수 없습니다</h1>
    <p class="lead">
      요청하신 페이지가 이동했거나 삭제되었을 수 있습니다.<br/>
      아래에서 주요 자원으로 바로 이동하세요.
    </p>

    <div class="path" id="reqPath" aria-live="polite">요청 경로 확인 중…</div>

    <nav class="links" aria-label="주요 자원">
      <a href="./" class="link">
        <span class="icon" aria-hidden="true">🏠</span>
        프로젝트 홈
        <span class="sub">랜딩 페이지</span>
      </a>
      <a href="go.html" class="link">
        <span class="icon" aria-hidden="true">🚀</span>
        빠른 접속 허브
        <span class="sub">모든 자원 모음</span>
      </a>
      <a href="swarm_3d_simulator_v2.html" class="link">
        <span class="icon" aria-hidden="true">🎮</span>
        3D 시뮬레이터
        <span class="sub">v2 신규 버전</span>
      </a>
      <a href="https://github.com/sun475300-sudo/swarm-drone-atc" class="link">
        <span class="icon" aria-hidden="true">💻</span>
        GitHub 저장소
        <span class="sub">소스 코드</span>
      </a>
    </nav>

    <footer>
      SDACS · Swarm Drone Airspace Control System<br />
      © 2026 장선우 · Mokpo National University ·
      <a href="mailto:sun475300@gmail.com">sun475300@gmail.com</a>
    </footer>
  </main>

  <script>
    // 현재 잘못된 경로를 안전하게 표시 (XSS 방지 — textContent 사용)
    try {
      var p = window.location.pathname + window.location.search;
      var el = document.getElementById('reqPath');
      if (el) {
        el.textContent = '';
        var prefix = document.createTextNode('요청 경로: ');
        var code = document.createElement('strong');
        code.textContent = p || '/';
        el.appendChild(prefix);
        el.appendChild(code);
      }
    } catch (e) { /* noop */ }
  </script>
</body>
</html>
