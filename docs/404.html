<style>
  :root { --p:#0055AA; --a:#FF6F00; --bg:#F5F7FA; --text:#1f2937; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Inter','Pretendard','Malgun Gothic',sans-serif;
    min-height:100vh; display:grid; place-items:center; background:var(--bg);
    color:var(--text); padding:24px; word-break:keep-all;
  }
  .box { max-width:520px; text-align:center; }
  .code {
    font-size:clamp(72px,14vw,128px);
    font-weight:900;
    background:linear-gradient(135deg,#0055AA 0%,#FF6F00 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    line-height:1; letter-spacing:-4px;
  }
  h1 { font-size:22px; margin:16px 0 10px; color:#0b0f17; }
  p { color:#6b7280; margin-bottom:28px; }
  .btn {
    display:inline-flex; align-items:center; gap:8px;
    padding:12px 22px; background:var(--p); color:#fff;
    border-radius:10px; text-decoration:none; font-weight:600;
    transition:background .2s;
  }
  .btn:hover { background:#003d7a; }
  .sub { margin-top:14px; font-size:13px; color:#6b7280; }
  .sub a { color:var(--p); }
</style>
</head>
