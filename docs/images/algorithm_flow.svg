<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480" font-family="'Malgun Gothic','맑은 고딕','Noto Sans KR','Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arr3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="900" height="480" fill="url(#bg2)" rx="16"/>
  <text x="450" y="36" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">핵심 알고리즘 처리 흐름</text>
  <text x="450" y="56" text-anchor="middle" fill="#94a3b8" font-size="12">APF · CBS · Resolution Advisory · Monte Carlo Pipeline</text>

  <!-- ── Top row: APF Pipeline ── -->
  <text x="30" y="90" fill="#60a5fa" font-size="12" font-weight="700">① APF 충돌 회피 파이프라인 (10 Hz)</text>

  <!-- Step boxes -->
  <rect x="30"  y="100" width="120" height="54" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="90" y="122" text-anchor="middle" fill="#93c5fd" font-size="18">📡</text>
  <text x="90" y="142" text-anchor="middle" fill="#bfdbfe" font-size="10">드론 상태 수집</text>
  <text x="90" y="153" text-anchor="middle" fill="#60a5fa" font-size="9">position · velocity</text>

  <line x1="150" y1="127" x2="178" y2="127" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr2)"/>

  <rect x="180" y="100" width="120" height="54" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="240" y="122" text-anchor="middle" fill="#93c5fd" font-size="18">⚡</text>
  <text x="240" y="142" text-anchor="middle" fill="#bfdbfe" font-size="10">포텐셜 장 계산</text>
  <text x="240" y="153" text-anchor="middle" fill="#60a5fa" font-size="9">인력 + 반발력</text>

  <line x1="300" y1="127" x2="328" y2="127" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr2)"/>

  <rect x="330" y="100" width="120" height="54" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="390" y="122" text-anchor="middle" fill="#93c5fd" font-size="18">🧮</text>
  <text x="390" y="142" text-anchor="middle" fill="#bfdbfe" font-size="10">배치 합산</text>
  <text x="390" y="153" text-anchor="middle" fill="#60a5fa" font-size="9">N-body 벡터합</text>

  <line x1="450" y1="127" x2="478" y2="127" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr2)"/>

  <rect x="480" y="100" width="120" height="54" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="540" y="122" text-anchor="middle" fill="#93c5fd" font-size="18">🏃</text>
  <text x="540" y="142" text-anchor="middle" fill="#bfdbfe" font-size="10">속도 변환</text>
  <text x="540" y="153" text-anchor="middle" fill="#60a5fa" font-size="9">force → velocity</text>

  <line x1="600" y1="127" x2="628" y2="127" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr2)"/>

  <rect x="630" y="100" width="120" height="54" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="690" y="122" text-anchor="middle" fill="#93c5fd" font-size="18">✅</text>
  <text x="690" y="142" text-anchor="middle" fill="#bfdbfe" font-size="10">위치 업데이트</text>
  <text x="690" y="153" text-anchor="middle" fill="#60a5fa" font-size="9">EVADING 상태</text>

  <line x1="750" y1="127" x2="778" y2="127" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr2)"/>

  <rect x="780" y="100" width="100" height="54" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="830" y="122" text-anchor="middle" fill="#93c5fd" font-size="18">🔁</text>
  <text x="830" y="142" text-anchor="middle" fill="#bfdbfe" font-size="10">다음 틱</text>
  <text x="830" y="153" text-anchor="middle" fill="#60a5fa" font-size="9">dt = 0.1s</text>

  <!-- ── Middle row: Controller Pipeline ── -->
  <text x="30" y="196" fill="#34d399" font-size="12" font-weight="700">② 공역 컨트롤러 파이프라인 (1 Hz)</text>

  <rect x="30"  y="206" width="120" height="54" rx="8" fill="#064e3b" stroke="#059669" stroke-width="1.5"/>
  <text x="90" y="228" text-anchor="middle" fill="#6ee7b7" font-size="18">📥</text>
  <text x="90" y="248" text-anchor="middle" fill="#d1fae5" font-size="10">텔레메트리 수신</text>
  <text x="90" y="259" text-anchor="middle" fill="#34d399" font-size="9">CommunicationBus</text>

  <line x1="150" y1="233" x2="178" y2="233" stroke="#34d399" stroke-width="2" marker-end="url(#arr3)"/>

  <rect x="180" y="206" width="120" height="54" rx="8" fill="#064e3b" stroke="#059669" stroke-width="1.5"/>
  <text x="240" y="228" text-anchor="middle" fill="#6ee7b7" font-size="18">🗺️</text>
  <text x="240" y="248" text-anchor="middle" fill="#d1fae5" font-size="10">허가 처리</text>
  <text x="240" y="259" text-anchor="middle" fill="#34d399" font-size="9">A* 경로 계획</text>

  <line x1="300" y1="233" x2="328" y2="233" stroke="#34d399" stroke-width="2" marker-end="url(#arr3)"/>

  <rect x="330" y="206" width="120" height="54" rx="8" fill="#064e3b" stroke="#059669" stroke-width="1.5"/>
  <text x="390" y="228" text-anchor="middle" fill="#6ee7b7" font-size="18">🔍</text>
  <text x="390" y="248" text-anchor="middle" fill="#d1fae5" font-size="10">CPA 충돌 스캔</text>
  <text x="390" y="259" text-anchor="middle" fill="#34d399" font-size="9">lookahead 90s</text>

  <line x1="450" y1="233" x2="478" y2="233" stroke="#34d399" stroke-width="2" marker-end="url(#arr3)"/>

  <rect x="480" y="206" width="120" height="54" rx="8" fill="#064e3b" stroke="#059669" stroke-width="1.5"/>
  <text x="540" y="228" text-anchor="middle" fill="#6ee7b7" font-size="18">📢</text>
  <text x="540" y="248" text-anchor="middle" fill="#d1fae5" font-size="10">어드바이저리</text>
  <text x="540" y="259" text-anchor="middle" fill="#34d399" font-size="9">CLIMB/TURN/EVADE</text>

  <line x1="600" y1="233" x2="628" y2="233" stroke="#34d399" stroke-width="2" marker-end="url(#arr3)"/>

  <rect x="630" y="206" width="120" height="54" rx="8" fill="#064e3b" stroke="#059669" stroke-width="1.5"/>
  <text x="690" y="228" text-anchor="middle" fill="#6ee7b7" font-size="18">🚨</text>
  <text x="690" y="248" text-anchor="middle" fill="#d1fae5" font-size="10">침입 탐지</text>
  <text x="690" y="259" text-anchor="middle" fill="#34d399" font-size="9">ROGUE → Alert</text>

  <line x1="750" y1="233" x2="778" y2="233" stroke="#34d399" stroke-width="2" marker-end="url(#arr3)"/>

  <rect x="780" y="206" width="100" height="54" rx="8" fill="#064e3b" stroke="#059669" stroke-width="1.5"/>
  <text x="830" y="228" text-anchor="middle" fill="#6ee7b7" font-size="18">🔺</text>
  <text x="830" y="248" text-anchor="middle" fill="#d1fae5" font-size="10">Voronoi 갱신</text>
  <text x="830" y="259" text-anchor="middle" fill="#34d399" font-size="9">10s 주기</text>

  <!-- ── Bottom row: Monte Carlo ── -->
  <text x="30" y="300" fill="#f9a8d4" font-size="12" font-weight="700">③ Monte Carlo 파라미터 스윕 파이프라인</text>

  <rect x="30"  y="310" width="130" height="54" rx="8" fill="#4a044e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="95" y="332" text-anchor="middle" fill="#e9d5ff" font-size="18">📂</text>
  <text x="95" y="349" text-anchor="middle" fill="#f3e8ff" font-size="10">monte_carlo.yaml</text>
  <text x="95" y="360" text-anchor="middle" fill="#c084fc" font-size="9">파라미터 레벨 정의</text>

  <line x1="160" y1="337" x2="188" y2="337" stroke="#a855f7" stroke-width="2" marker-end="url(#arr2)"/>

  <rect x="190" y="310" width="130" height="54" rx="8" fill="#4a044e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="255" y="332" text-anchor="middle" fill="#e9d5ff" font-size="18">🔢</text>
  <text x="255" y="349" text-anchor="middle" fill="#f3e8ff" font-size="10">Cartesian Product</text>
  <text x="255" y="360" text-anchor="middle" fill="#c084fc" font-size="9">384 configs × 100</text>

  <line x1="320" y1="337" x2="348" y2="337" stroke="#a855f7" stroke-width="2" marker-end="url(#arr2)"/>

  <rect x="350" y="310" width="130" height="54" rx="8" fill="#4a044e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="415" y="332" text-anchor="middle" fill="#e9d5ff" font-size="18">⚡</text>
  <text x="415" y="349" text-anchor="middle" fill="#f3e8ff" font-size="10">joblib 병렬</text>
  <text x="415" y="360" text-anchor="middle" fill="#c084fc" font-size="9">loky 멀티프로세싱</text>

  <line x1="480" y1="337" x2="508" y2="337" stroke="#a855f7" stroke-width="2" marker-end="url(#arr2)"/>

  <rect x="510" y="310" width="130" height="54" rx="8" fill="#4a044e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="575" y="332" text-anchor="middle" fill="#e9d5ff" font-size="18">🎲</text>
  <text x="575" y="349" text-anchor="middle" fill="#f3e8ff" font-size="10">run_one(params)</text>
  <text x="575" y="360" text-anchor="middle" fill="#c084fc" font-size="9">SwarmSimulator 단일</text>

  <line x1="640" y1="337" x2="668" y2="337" stroke="#a855f7" stroke-width="2" marker-end="url(#arr2)"/>

  <rect x="670" y="310" width="100" height="54" rx="8" fill="#4a044e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="720" y="332" text-anchor="middle" fill="#e9d5ff" font-size="18">📊</text>
  <text x="720" y="349" text-anchor="middle" fill="#f3e8ff" font-size="10">DataFrame</text>
  <text x="720" y="360" text-anchor="middle" fill="#c084fc" font-size="9">합격 판정</text>

  <line x1="770" y1="337" x2="798" y2="337" stroke="#a855f7" stroke-width="2" marker-end="url(#arr2)"/>

  <rect x="800" y="310" width="80" height="54" rx="8" fill="#4a044e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="840" y="332" text-anchor="middle" fill="#e9d5ff" font-size="18">💾</text>
  <text x="840" y="349" text-anchor="middle" fill="#f3e8ff" font-size="10">Parquet</text>
  <text x="840" y="360" text-anchor="middle" fill="#c084fc" font-size="9">snappy 압축</text>

  <!-- ── SLA Table ── -->
  <rect x="30" y="390" width="840" height="68" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.2"/>
  <text x="50" y="412" fill="#94a3b8" font-size="11" font-weight="700">SLA 수락 기준 (Acceptance Thresholds)</text>

  <rect x="50"  y="418" width="130" height="28" rx="5" fill="#14532d"/>
  <text x="115" y="436" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">충돌률 0건/1000h</text>

  <rect x="195" y="418" width="150" height="28" rx="5" fill="#14532d"/>
  <text x="270" y="436" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">분리 해결률 ≥ 99.5%</text>

  <rect x="360" y="418" width="140" height="28" rx="5" fill="#14532d"/>
  <text x="430" y="436" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">경로 효율 ≤ 1.15</text>

  <rect x="515" y="418" width="165" height="28" rx="5" fill="#78350f"/>
  <text x="597" y="436" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="600">어드바이저리 P99 ≤ 10s</text>

  <rect x="695" y="418" width="165" height="28" rx="5" fill="#78350f"/>
  <text x="777" y="436" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="600">침입 탐지 P90 ≤ 5s</text>

  <text x="450" y="470" text-anchor="middle" fill="#475569" font-size="10">SDACS v0.1.0 · Algorithm Flow Diagram</text>
</svg>
