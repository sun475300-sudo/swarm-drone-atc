<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" width="900" height="640" font-family="'Segoe UI',Arial,sans-serif">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="layer1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="layer2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#065f46"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="layer3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c2d12"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="layer4Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#581c87"/>
      <stop offset="100%" style="stop-color:#9333ea"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="900" height="640" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700">군집드론 공역통제 자동화 시스템 (SDACS)</text>
  <text x="450" y="64" text-anchor="middle" fill="#94a3b8" font-size="13">Swarm Drone Airspace Control System · 4-Layer Architecture</text>

  <!-- ── Layer 1: 공중 (드론) ── -->
  <rect x="40" y="88" width="820" height="118" rx="12" fill="url(#layer1Grad)" opacity="0.18" stroke="#2563eb" stroke-width="1.5"/>
  <text x="60" y="110" fill="#93c5fd" font-size="11" font-weight="600">LAYER 1 · 드론 군집 (Aerial)</text>
  <!-- Drone boxes -->
  <rect x="60"  y="118" width="130" height="72" rx="8" fill="#1d4ed8" opacity="0.7" filter="url(#shadow)"/>
  <text x="125" y="142" text-anchor="middle" fill="#bfdbfe" font-size="20">🚁</text>
  <text x="125" y="162" text-anchor="middle" fill="#e0f2fe" font-size="11" font-weight="600">Boids 3D</text>
  <text x="125" y="178" text-anchor="middle" fill="#93c5fd" font-size="10">군집 알고리즘</text>

  <rect x="210" y="118" width="130" height="72" rx="8" fill="#1d4ed8" opacity="0.7" filter="url(#shadow)"/>
  <text x="275" y="142" text-anchor="middle" fill="#bfdbfe" font-size="20">⚡</text>
  <text x="275" y="162" text-anchor="middle" fill="#e0f2fe" font-size="11" font-weight="600">APF 회피</text>
  <text x="275" y="178" text-anchor="middle" fill="#93c5fd" font-size="10">인공 포텐셜 장</text>

  <rect x="360" y="118" width="130" height="72" rx="8" fill="#1d4ed8" opacity="0.7" filter="url(#shadow)"/>
  <text x="425" y="142" text-anchor="middle" fill="#bfdbfe" font-size="20">🎯</text>
  <text x="425" y="162" text-anchor="middle" fill="#e0f2fe" font-size="11" font-weight="600">CBS 플래너</text>
  <text x="425" y="178" text-anchor="middle" fill="#93c5fd" font-size="10">다중에이전트 경로</text>

  <rect x="510" y="118" width="130" height="72" rx="8" fill="#1d4ed8" opacity="0.7" filter="url(#shadow)"/>
  <text x="575" y="142" text-anchor="middle" fill="#bfdbfe" font-size="20">📡</text>
  <text x="575" y="162" text-anchor="middle" fill="#e0f2fe" font-size="11" font-weight="600">텔레메트리</text>
  <text x="575" y="178" text-anchor="middle" fill="#93c5fd" font-size="10">10 Hz 상태 전송</text>

  <rect x="660" y="118" width="180" height="72" rx="8" fill="#1d4ed8" opacity="0.7" filter="url(#shadow)"/>
  <text x="750" y="142" text-anchor="middle" fill="#bfdbfe" font-size="20">🔋</text>
  <text x="750" y="162" text-anchor="middle" fill="#e0f2fe" font-size="11" font-weight="600">배터리 / 장애</text>
  <text x="750" y="178" text-anchor="middle" fill="#93c5fd" font-size="10">이차 전력 모델 · RTL</text>

  <!-- Arrow 1→2 -->
  <line x1="450" y1="206" x2="450" y2="232" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="460" y="222" fill="#94a3b8" font-size="10">SimPy CommBus / MAVLink</text>

  <!-- ── Layer 2: 지상 제어 ── -->
  <rect x="40" y="236" width="820" height="118" rx="12" fill="url(#layer2Grad)" opacity="0.18" stroke="#059669" stroke-width="1.5"/>
  <text x="60" y="258" fill="#6ee7b7" font-size="11" font-weight="600">LAYER 2 · 공역 컨트롤러 (Airspace Control)</text>

  <rect x="60"  y="266" width="155" height="72" rx="8" fill="#065f46" opacity="0.8" filter="url(#shadow)"/>
  <text x="137" y="290" text-anchor="middle" fill="#a7f3d0" font-size="20">🗺️</text>
  <text x="137" y="310" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="600">AirspaceController</text>
  <text x="137" y="326" text-anchor="middle" fill="#6ee7b7" font-size="10">1 Hz 제어 루프</text>

  <rect x="232" y="266" width="155" height="72" rx="8" fill="#065f46" opacity="0.8" filter="url(#shadow)"/>
  <text x="309" y="290" text-anchor="middle" fill="#a7f3d0" font-size="20">🔍</text>
  <text x="309" y="310" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="600">충돌 스캔</text>
  <text x="309" y="326" text-anchor="middle" fill="#6ee7b7" font-size="10">O(N²) CPA 예측</text>

  <rect x="404" y="266" width="155" height="72" rx="8" fill="#065f46" opacity="0.8" filter="url(#shadow)"/>
  <text x="481" y="290" text-anchor="middle" fill="#a7f3d0" font-size="20">📋</text>
  <text x="481" y="310" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="600">허가 처리</text>
  <text x="481" y="326" text-anchor="middle" fill="#6ee7b7" font-size="10">우선순위 큐 · A*</text>

  <rect x="576" y="266" width="155" height="72" rx="8" fill="#065f46" opacity="0.8" filter="url(#shadow)"/>
  <text x="653" y="290" text-anchor="middle" fill="#a7f3d0" font-size="20">🔺</text>
  <text x="653" y="310" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="600">Voronoi 분할</text>
  <text x="653" y="326" text-anchor="middle" fill="#6ee7b7" font-size="10">10 s 주기 갱신</text>

  <rect x="748" y="266" width="112" height="72" rx="8" fill="#065f46" opacity="0.8" filter="url(#shadow)"/>
  <text x="804" y="290" text-anchor="middle" fill="#a7f3d0" font-size="20">🚨</text>
  <text x="804" y="310" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="600">침입 탐지</text>
  <text x="804" y="326" text-anchor="middle" fill="#6ee7b7" font-size="10">ROGUE 식별</text>

  <!-- Arrow 2→3 -->
  <line x1="450" y1="354" x2="450" y2="380" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="460" y="370" fill="#94a3b8" font-size="10">REST / WebSocket</text>

  <!-- ── Layer 3: 시뮬레이션 ── -->
  <rect x="40" y="384" width="820" height="118" rx="12" fill="url(#layer3Grad)" opacity="0.18" stroke="#ea580c" stroke-width="1.5"/>
  <text x="60" y="406" fill="#fdba74" font-size="11" font-weight="600">LAYER 3 · 시뮬레이션 인프라 (Simulation)</text>

  <rect x="60"  y="414" width="145" height="72" rx="8" fill="#7c2d12" opacity="0.8" filter="url(#shadow)"/>
  <text x="132" y="438" text-anchor="middle" fill="#fed7aa" font-size="20">⚙️</text>
  <text x="132" y="458" text-anchor="middle" fill="#ffedd5" font-size="11" font-weight="600">SwarmSimulator</text>
  <text x="132" y="474" text-anchor="middle" fill="#fdba74" font-size="10">SimPy 이산 이벤트</text>

  <rect x="222" y="414" width="145" height="72" rx="8" fill="#7c2d12" opacity="0.8" filter="url(#shadow)"/>
  <text x="294" y="438" text-anchor="middle" fill="#fed7aa" font-size="20">🌬️</text>
  <text x="294" y="458" text-anchor="middle" fill="#ffedd5" font-size="11" font-weight="600">기상 모델</text>
  <text x="294" y="474" text-anchor="middle" fill="#fdba74" font-size="10">Wind · Gust · Shear</text>

  <rect x="384" y="414" width="145" height="72" rx="8" fill="#7c2d12" opacity="0.8" filter="url(#shadow)"/>
  <text x="456" y="438" text-anchor="middle" fill="#fed7aa" font-size="20">📊</text>
  <text x="456" y="458" text-anchor="middle" fill="#ffedd5" font-size="11" font-weight="600">Analytics</text>
  <text x="456" y="474" text-anchor="middle" fill="#fdba74" font-size="10">이벤트 · 지표 수집</text>

  <rect x="546" y="414" width="145" height="72" rx="8" fill="#7c2d12" opacity="0.8" filter="url(#shadow)"/>
  <text x="618" y="438" text-anchor="middle" fill="#fed7aa" font-size="20">🎲</text>
  <text x="618" y="458" text-anchor="middle" fill="#ffedd5" font-size="11" font-weight="600">Monte Carlo</text>
  <text x="618" y="474" text-anchor="middle" fill="#fdba74" font-size="10">joblib 병렬 38,400회</text>

  <rect x="708" y="414" width="152" height="72" rx="8" fill="#7c2d12" opacity="0.8" filter="url(#shadow)"/>
  <text x="784" y="438" text-anchor="middle" fill="#fed7aa" font-size="20">🎬</text>
  <text x="784" y="458" text-anchor="middle" fill="#ffedd5" font-size="11" font-weight="600">시나리오 러너</text>
  <text x="784" y="474" text-anchor="middle" fill="#fdba74" font-size="10">7개 명명 시나리오</text>

  <!-- Arrow 3→4 -->
  <line x1="450" y1="502" x2="450" y2="528" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="460" y="518" fill="#94a3b8" font-size="10">Dash / CLI</text>

  <!-- ── Layer 4: 사용자 ── -->
  <rect x="40" y="532" width="820" height="78" rx="12" fill="url(#layer4Grad)" opacity="0.18" stroke="#9333ea" stroke-width="1.5"/>
  <text x="60" y="554" fill="#d8b4fe" font-size="11" font-weight="600">LAYER 4 · 사용자 인터페이스 (User Interface)</text>

  <rect x="60"  y="562" width="175" height="38" rx="7" fill="#581c87" opacity="0.8"/>
  <text x="147" y="576" text-anchor="middle" fill="#e9d5ff" font-size="11" font-weight="600">📺 3D Dash 시각화</text>
  <text x="147" y="591" text-anchor="middle" fill="#c4b5fd" font-size="10">Plotly · 실시간 20 Hz</text>

  <rect x="252" y="562" width="175" height="38" rx="7" fill="#581c87" opacity="0.8"/>
  <text x="339" y="576" text-anchor="middle" fill="#e9d5ff" font-size="11" font-weight="600">⌨️ 통합 CLI</text>
  <text x="339" y="591" text-anchor="middle" fill="#c4b5fd" font-size="10">python main.py &lt;cmd&gt;</text>

  <rect x="444" y="562" width="175" height="38" rx="7" fill="#581c87" opacity="0.8"/>
  <text x="531" y="576" text-anchor="middle" fill="#e9d5ff" font-size="11" font-weight="600">📈 결과 분석</text>
  <text x="531" y="591" text-anchor="middle" fill="#c4b5fd" font-size="10">Parquet · pandas</text>

  <rect x="636" y="562" width="224" height="38" rx="7" fill="#581c87" opacity="0.8"/>
  <text x="748" y="576" text-anchor="middle" fill="#e9d5ff" font-size="11" font-weight="600">🧪 pytest 테스트 스위트</text>
  <text x="748" y="591" text-anchor="middle" fill="#c4b5fd" font-size="10">63개 단위 · 통합 테스트</text>

  <!-- Footer -->
  <text x="450" y="628" text-anchor="middle" fill="#475569" font-size="10">SDACS v0.1.0 · MIT License · github.com/sun475300-sudo/swarm-drone-atc</text>
</svg>
