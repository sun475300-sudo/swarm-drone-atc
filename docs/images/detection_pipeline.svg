<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" width="960" height="380" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="25%" style="stop-color:#0891b2"/>
      <stop offset="50%" style="stop-color:#059669"/>
      <stop offset="75%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <marker id="arr" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#64748b"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="960" height="380" fill="url(#bg)" rx="18"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="800" letter-spacing="0.5">탐지 → 퇴각 자동 대응 파이프라인</text>
  <text x="480" y="62" text-anchor="middle" fill="#94a3b8" font-size="12">Detection → Retreat Automated Response · Target Latency &lt; 1s</text>

  <!-- Progress bar -->
  <rect x="60" y="78" width="840" height="6" rx="3" fill="#1e293b"/>
  <rect x="60" y="78" width="840" height="6" rx="3" fill="url(#pipeGrad)" opacity="0.85"/>

  <!-- ── Stage 1: 탐지 ── -->
  <rect x="40" y="100" width="158" height="180" rx="14" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="100" width="158" height="8" rx="7" fill="#2563eb"/>
  <text x="119" y="86" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">① 탐지  50 ms</text>
  <text x="119" y="142" text-anchor="middle" fill="#60a5fa" font-size="36" filter="url(#glow)">🎯</text>
  <text x="119" y="170" text-anchor="middle" fill="#bfdbfe" font-size="13" font-weight="700">DETECT</text>
  <text x="119" y="190" text-anchor="middle" fill="#93c5fd" font-size="10">YOLO v8 카메라</text>
  <text x="119" y="206" text-anchor="middle" fill="#93c5fd" font-size="10">LiDAR 포인트클라우드</text>
  <text x="119" y="222" text-anchor="middle" fill="#93c5fd" font-size="10">RF 스펙트럼 스캔</text>
  <rect x="58" y="252" width="122" height="20" rx="5" fill="#1d4ed8" opacity="0.6"/>
  <text x="119" y="266" text-anchor="middle" fill="#bfdbfe" font-size="10" font-weight="600">센서 퓨전 칼만 필터</text>

  <!-- Arrow 1→2 -->
  <line x1="200" y1="190" x2="228" y2="190" stroke="#64748b" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="214" y="183" text-anchor="middle" fill="#64748b" font-size="9">50ms</text>

  <!-- ── Stage 2: 식별 ── -->
  <rect x="230" y="100" width="158" height="180" rx="14" fill="#164e63" stroke="#0891b2" stroke-width="2" filter="url(#shadow)"/>
  <rect x="230" y="100" width="158" height="8" rx="7" fill="#0e7490"/>
  <text x="309" y="86" text-anchor="middle" fill="#a5f3fc" font-size="11" font-weight="700">② 식별  100 ms</text>
  <text x="309" y="142" text-anchor="middle" fill="#67e8f9" font-size="36" filter="url(#glow)">🔍</text>
  <text x="309" y="170" text-anchor="middle" fill="#cffafe" font-size="13" font-weight="700">IDENTIFY</text>
  <text x="309" y="190" text-anchor="middle" fill="#a5f3fc" font-size="10">Remote ID 파싱</text>
  <text x="309" y="206" text-anchor="middle" fill="#a5f3fc" font-size="10">드론 등록 DB 조회</text>
  <text x="309" y="222" text-anchor="middle" fill="#a5f3fc" font-size="10">ROGUE 판별 로직</text>
  <rect x="248" y="252" width="122" height="20" rx="5" fill="#0e7490" opacity="0.6"/>
  <text x="309" y="266" text-anchor="middle" fill="#cffafe" font-size="10" font-weight="600">IntrusionAlert 발령</text>

  <!-- Arrow 2→3 -->
  <line x1="390" y1="190" x2="418" y2="190" stroke="#64748b" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="404" y="183" text-anchor="middle" fill="#64748b" font-size="9">100ms</text>

  <!-- ── Stage 3: 타이머 ── -->
  <rect x="420" y="100" width="158" height="180" rx="14" fill="#1c3523" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <rect x="420" y="100" width="158" height="8" rx="7" fill="#15803d"/>
  <text x="499" y="86" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700">③ 타이머  즉시</text>
  <text x="499" y="142" text-anchor="middle" fill="#4ade80" font-size="36" filter="url(#glow)">⏱️</text>
  <text x="499" y="170" text-anchor="middle" fill="#dcfce7" font-size="13" font-weight="700">TIMER</text>
  <text x="499" y="190" text-anchor="middle" fill="#86efac" font-size="10">Redis TTL 설정</text>
  <text x="499" y="206" text-anchor="middle" fill="#86efac" font-size="10">T-2min 경고 예약</text>
  <text x="499" y="222" text-anchor="middle" fill="#86efac" font-size="10">이벤트 드리븐 트리거</text>
  <rect x="438" y="252" width="122" height="20" rx="5" fill="#15803d" opacity="0.6"/>
  <text x="499" y="266" text-anchor="middle" fill="#dcfce7" font-size="10" font-weight="600">SimPy EventBus 전파</text>

  <!-- Arrow 3→4 -->
  <line x1="580" y1="190" x2="608" y2="190" stroke="#64748b" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="594" y="183" text-anchor="middle" fill="#64748b" font-size="9">T-2min</text>

  <!-- ── Stage 4: 경고 ── -->
  <rect x="610" y="100" width="158" height="180" rx="14" fill="#451a03" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <rect x="610" y="100" width="158" height="8" rx="7" fill="#d97706"/>
  <text x="689" y="86" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="700">④ 경고  0.8s</text>
  <text x="689" y="142" text-anchor="middle" fill="#fbbf24" font-size="36" filter="url(#glow)">⚠️</text>
  <text x="689" y="170" text-anchor="middle" fill="#fef3c7" font-size="13" font-weight="700">WARN</text>
  <text x="689" y="190" text-anchor="middle" fill="#fde68a" font-size="10">관제사 알림</text>
  <text x="689" y="206" text-anchor="middle" fill="#fde68a" font-size="10">ResolutionAdvisory 발령</text>
  <text x="689" y="222" text-anchor="middle" fill="#fde68a" font-size="10">인근 드론 경보</text>
  <rect x="628" y="252" width="122" height="20" rx="5" fill="#b45309" opacity="0.6"/>
  <text x="689" y="266" text-anchor="middle" fill="#fef3c7" font-size="10" font-weight="600">CRITICAL / HIGH / MED</text>

  <!-- Arrow 4→5 -->
  <line x1="770" y1="190" x2="798" y2="190" stroke="#64748b" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="784" y="183" text-anchor="middle" fill="#64748b" font-size="9">실시간</text>

  <!-- ── Stage 5: 퇴각 ── -->
  <rect x="800" y="100" width="140" height="180" rx="14" fill="#450a0a" stroke="#ef4444" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="800" y="100" width="140" height="8" rx="7" fill="#dc2626"/>
  <text x="870" y="86" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">⑤ 퇴각  실시간</text>
  <text x="870" y="142" text-anchor="middle" fill="#f87171" font-size="36" filter="url(#glow)">🚁</text>
  <text x="870" y="170" text-anchor="middle" fill="#fee2e2" font-size="13" font-weight="700">RETREAT</text>
  <text x="870" y="190" text-anchor="middle" fill="#fca5a5" font-size="10">EVADE_APF 기동</text>
  <text x="870" y="206" text-anchor="middle" fill="#fca5a5" font-size="10">Voronoi 재분할</text>
  <text x="870" y="222" text-anchor="middle" fill="#fca5a5" font-size="10">공역 클리어</text>
  <rect x="818" y="252" width="104" height="20" rx="5" fill="#991b1b" opacity="0.7"/>
  <text x="870" y="266" text-anchor="middle" fill="#fee2e2" font-size="10" font-weight="600">포위 기동 실행</text>

  <!-- ── Bottom latency bar ── -->
  <rect x="40" y="298" width="860" height="58" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="480" y="318" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">누적 레이턴시 타임라인</text>

  <!-- Latency markers -->
  <rect x="60"  y="326" width="80" height="18" rx="4" fill="#1d4ed8" opacity="0.8"/>
  <text x="100" y="339" text-anchor="middle" fill="#bfdbfe" font-size="9" font-weight="600">50 ms</text>

  <rect x="148" y="326" width="80" height="18" rx="4" fill="#0e7490" opacity="0.8"/>
  <text x="188" y="339" text-anchor="middle" fill="#cffafe" font-size="9" font-weight="600">150 ms</text>

  <rect x="236" y="326" width="130" height="18" rx="4" fill="#15803d" opacity="0.8"/>
  <text x="301" y="339" text-anchor="middle" fill="#dcfce7" font-size="9" font-weight="600">즉시 (이벤트)</text>

  <rect x="374" y="326" width="230" height="18" rx="4" fill="#b45309" opacity="0.8"/>
  <text x="489" y="339" text-anchor="middle" fill="#fef3c7" font-size="9" font-weight="600">800 ms 도달 ✅</text>

  <rect x="612" y="326" width="260" height="18" rx="4" fill="#991b1b" opacity="0.8"/>
  <text x="742" y="339" text-anchor="middle" fill="#fee2e2" font-size="9" font-weight="600">1,000 ms 이내 퇴각 완료 🎯</text>

  <text x="480" y="368" text-anchor="middle" fill="#475569" font-size="10">목표: 탐지→퇴각 총 레이턴시 &lt; 1초 · 달성: 0.8초 ✅</text>
</svg>
