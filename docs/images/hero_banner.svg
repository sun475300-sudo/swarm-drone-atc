<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" font-family="'Malgun Gothic','맑은 고딕','Noto Sans KR','Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="heroBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#6366f1;stop-opacity:0.8"/>
      <stop offset="60%" style="stop-color:#8b5cf6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0"/>
    </radialGradient>
    <filter id="heroGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#heroBase)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#6366f1" stroke-width="0.5">
    <line x1="0" y1="50"  x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Center radial glow -->
  <ellipse cx="600" cy="200" rx="400" ry="250" fill="url(#centerGlow)"/>

  <!-- Horizontal glow line -->
  <rect x="0" y="196" width="1200" height="8" fill="url(#glowLine)" rx="4"/>

  <!-- Orbital circles (airspace rings) -->
  <circle cx="600" cy="200" r="280" fill="none" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="12,8" opacity="0.25"/>
  <circle cx="600" cy="200" r="210" fill="none" stroke="#6366f1" stroke-width="0.8" stroke-dasharray="8,6" opacity="0.2"/>
  <circle cx="600" cy="200" r="140" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="6,5" opacity="0.3"/>
  <circle cx="600" cy="200" r="75"  fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.35"/>

  <!-- Drone trails -->
  <!-- Drone 1 (top-right arc) -->
  <path d="M 820 100 Q 750 140 700 160" stroke="#60a5fa" stroke-width="1.5" fill="none" opacity="0.5" stroke-dasharray="4,3"/>
  <circle cx="700" cy="160" r="5" fill="#60a5fa" opacity="0.9" filter="url(#softGlow)"/>
  <text x="700" cy="160" x="694" y="154" fill="#93c5fd" font-size="16" filter="url(#softGlow)">🚁</text>

  <!-- Drone 2 (right) -->
  <path d="M 900 190 Q 840 195 800 195" stroke="#34d399" stroke-width="1.5" fill="none" opacity="0.5" stroke-dasharray="4,3"/>
  <circle cx="800" cy="195" r="5" fill="#34d399" opacity="0.9" filter="url(#softGlow)"/>
  <text x="795" y="189" fill="#6ee7b7" font-size="16" filter="url(#softGlow)">🚁</text>

  <!-- Drone 3 (bottom-right) -->
  <path d="M 780 310 Q 730 280 710 260" stroke="#f472b6" stroke-width="1.5" fill="none" opacity="0.5" stroke-dasharray="4,3"/>
  <circle cx="710" cy="260" r="5" fill="#f472b6" opacity="0.9"/>
  <text x="704" y="256" fill="#fbcfe8" font-size="16" filter="url(#softGlow)">🚁</text>

  <!-- Drone 4 (left) -->
  <path d="M 300 190 Q 360 195 400 195" stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.5" stroke-dasharray="4,3"/>
  <circle cx="400" cy="195" r="5" fill="#fbbf24" opacity="0.9"/>
  <text x="394" y="189" fill="#fde68a" font-size="16" filter="url(#softGlow)">🚁</text>

  <!-- Drone 5 (top-left) -->
  <path d="M 380 100 Q 440 135 480 155" stroke="#a78bfa" stroke-width="1.5" fill="none" opacity="0.5" stroke-dasharray="4,3"/>
  <circle cx="480" cy="155" r="5" fill="#a78bfa" opacity="0.9"/>
  <text x="474" y="149" fill="#ddd6fe" font-size="16" filter="url(#softGlow)">🚁</text>

  <!-- Center control node -->
  <circle cx="600" cy="200" r="38" fill="#0f172a" stroke="#6366f1" stroke-width="2.5" opacity="0.9"/>
  <circle cx="600" cy="200" r="30" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="600" y="208" text-anchor="middle" fill="#a78bfa" font-size="28">🗺️</text>

  <!-- Connection lines from drones to center -->
  <line x1="700" y1="160" x2="620" y2="188" stroke="#60a5fa" stroke-width="1" opacity="0.35" stroke-dasharray="5,4"/>
  <line x1="800" y1="195" x2="638" y2="200" stroke="#34d399" stroke-width="1" opacity="0.35" stroke-dasharray="5,4"/>
  <line x1="710" y1="260" x2="622" y2="216" stroke="#f472b6" stroke-width="1" opacity="0.35" stroke-dasharray="5,4"/>
  <line x1="400" y1="195" x2="562" y2="200" stroke="#fbbf24" stroke-width="1" opacity="0.35" stroke-dasharray="5,4"/>
  <line x1="480" y1="155" x2="574" y2="186" stroke="#a78bfa" stroke-width="1" opacity="0.35" stroke-dasharray="5,4"/>

  <!-- ── Main Title ── -->
  <text x="600" y="88" text-anchor="middle" font-size="44" font-weight="900" fill="url(#titleGrad)" filter="url(#heroGlow)" letter-spacing="1">
    군집드론 공역통제 자동화 시스템
  </text>
  <text x="600" y="122" text-anchor="middle" font-size="22" font-weight="400" fill="#cbd5e1" letter-spacing="3">
    Swarm Drone Airspace Control System
  </text>

  <!-- Subtitle underline -->
  <rect x="380" y="132" width="440" height="2" rx="1" fill="url(#glowLine)" opacity="0.7"/>

  <!-- ── Badge row ── -->
  <!-- Badge 1 -->
  <rect x="258" y="320" width="130" height="32" rx="8" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="323" y="340" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">🐍 Python 3.10+</text>

  <!-- Badge 2 -->
  <rect x="400" y="320" width="130" height="32" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1.2"/>
  <text x="465" y="340" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">⚙️ SimPy 4.1</text>

  <!-- Badge 3 -->
  <rect x="542" y="320" width="130" height="32" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.2"/>
  <text x="607" y="340" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="600">📊 Dash + Plotly</text>

  <!-- Badge 4 -->
  <rect x="684" y="320" width="140" height="32" rx="8" fill="#451a03" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="754" y="340" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="600">🎲 38,400 MC runs</text>

  <!-- Badge 5 -->
  <rect x="836" y="320" width="120" height="32" rx="8" fill="#14532d" stroke="#16a34a" stroke-width="1.2"/>
  <text x="896" y="340" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">✅ 173 Tests</text>

  <!-- Bottom tagline -->
  <text x="600" y="386" text-anchor="middle" fill="#475569" font-size="12" letter-spacing="1">
    APF · CBS · Voronoi · Monte Carlo · Real-time 3D Visualization
  </text>
</svg>
