<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" width="1000" height="480" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bgPC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="barBefore" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
    <linearGradient id="barAfter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#0e7490"/>
    </linearGradient>
    <linearGradient id="barAfterGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
    <filter id="pcShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1000" height="480" fill="url(#bgPC)" rx="18"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" fill="#f1f5f9" font-size="19" font-weight="800">성능 비교: 기존 방식 vs SDACS</text>
  <text x="500" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">Before (Rule-based Static ATC) vs After (SDACS Swarm Autonomous)</text>

  <!-- Legend -->
  <rect x="680" y="70" width="14" height="14" rx="3" fill="#ef4444"/>
  <text x="700" y="81" fill="#fca5a5" font-size="11">기존 방식</text>
  <rect x="760" y="70" width="14" height="14" rx="3" fill="#22d3ee"/>
  <text x="780" y="81" fill="#a5f3fc" font-size="11">SDACS</text>

  <!-- ── Chart 1: 충돌 해결률 (%) ── -->
  <text x="130" y="105" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">충돌 해결률 (%)</text>
  <!-- Axis -->
  <line x1="50" y1="110" x2="50" y2="230" stroke="#334155" stroke-width="1.5"/>
  <line x1="50" y1="230" x2="210" y2="230" stroke="#334155" stroke-width="1.5"/>
  <!-- Y labels -->
  <text x="44" y="114" text-anchor="end" fill="#64748b" font-size="9">100</text>
  <text x="44" y="156" text-anchor="end" fill="#64748b" font-size="9">75</text>
  <text x="44" y="198" text-anchor="end" fill="#64748b" font-size="9">50</text>
  <text x="44" y="234" text-anchor="end" fill="#64748b" font-size="9">0</text>
  <!-- Grid -->
  <line x1="50" y1="156" x2="210" y2="156" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="50" y1="198" x2="210" y2="198" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Bar Before: 78% → height = 78/100 * 120 = 93.6 -->
  <rect x="70" y="136" width="40" height="94" rx="4" fill="url(#barBefore)" filter="url(#pcShadow)"/>
  <text x="90" y="130" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="700">78%</text>
  <text x="90" y="244" text-anchor="middle" fill="#94a3b8" font-size="9">기존</text>
  <!-- Bar After: 99.7% → height = 99.7/100 * 120 = 119.6 -->
  <rect x="120" y="111" width="40" height="119" rx="4" fill="url(#barAfterGreen)" filter="url(#pcShadow)"/>
  <text x="140" y="105" text-anchor="middle" fill="#86efac" font-size="10" font-weight="700">99.7%</text>
  <text x="140" y="244" text-anchor="middle" fill="#94a3b8" font-size="9">SDACS</text>
  <!-- Improvement badge -->
  <rect x="62" y="255" width="96" height="18" rx="5" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="110" y="268" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">▲ +21.7 pp</text>

  <!-- ── Chart 2: 탐지 지연 (s) ── -->
  <text x="330" y="105" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">침입 탐지 지연 (s)</text>
  <!-- Axis -->
  <line x1="250" y1="110" x2="250" y2="230" stroke="#334155" stroke-width="1.5"/>
  <line x1="250" y1="230" x2="410" y2="230" stroke="#334155" stroke-width="1.5"/>
  <!-- Y labels -->
  <text x="244" y="114" text-anchor="end" fill="#64748b" font-size="9">30</text>
  <text x="244" y="150" text-anchor="end" fill="#64748b" font-size="9">20</text>
  <text x="244" y="190" text-anchor="end" fill="#64748b" font-size="9">10</text>
  <text x="244" y="234" text-anchor="end" fill="#64748b" font-size="9">0</text>
  <!-- Grid -->
  <line x1="250" y1="150" x2="410" y2="150" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="250" y1="190" x2="410" y2="190" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Bar Before: 25s → height = 25/30 * 120 = 100 -->
  <rect x="270" y="130" width="40" height="100" rx="4" fill="url(#barBefore)" filter="url(#pcShadow)"/>
  <text x="290" y="124" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="700">25s</text>
  <text x="290" y="244" text-anchor="middle" fill="#94a3b8" font-size="9">기존</text>
  <!-- Bar After: 3.2s → height = 3.2/30 * 120 = 12.8 -->
  <rect x="320" y="217" width="40" height="13" rx="4" fill="url(#barAfter)" filter="url(#pcShadow)"/>
  <text x="340" y="210" text-anchor="middle" fill="#a5f3fc" font-size="10" font-weight="700">3.2s</text>
  <text x="340" y="244" text-anchor="middle" fill="#94a3b8" font-size="9">SDACS</text>
  <rect x="262" y="255" width="96" height="18" rx="5" fill="#0c4a6e" stroke="#22d3ee" stroke-width="1"/>
  <text x="310" y="268" text-anchor="middle" fill="#a5f3fc" font-size="9" font-weight="600">▼ −87.2%</text>

  <!-- ── Chart 3: Near-miss 빈도 (/100h) ── -->
  <text x="530" y="105" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">Near-miss (/100 h)</text>
  <!-- Axis -->
  <line x1="450" y1="110" x2="450" y2="230" stroke="#334155" stroke-width="1.5"/>
  <line x1="450" y1="230" x2="610" y2="230" stroke="#334155" stroke-width="1.5"/>
  <!-- Y labels -->
  <text x="444" y="114" text-anchor="end" fill="#64748b" font-size="9">5.0</text>
  <text x="444" y="150" text-anchor="end" fill="#64748b" font-size="9">3.0</text>
  <text x="444" y="190" text-anchor="end" fill="#64748b" font-size="9">1.0</text>
  <text x="444" y="234" text-anchor="end" fill="#64748b" font-size="9">0</text>
  <!-- Grid -->
  <line x1="450" y1="150" x2="610" y2="150" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="450" y1="190" x2="610" y2="190" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Bar Before: 4.2 → height = 4.2/5 * 120 = 100.8 -->
  <rect x="470" y="129" width="40" height="101" rx="4" fill="url(#barBefore)" filter="url(#pcShadow)"/>
  <text x="490" y="123" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="700">4.2</text>
  <text x="490" y="244" text-anchor="middle" fill="#94a3b8" font-size="9">기존</text>
  <!-- Bar After: 0.08 → height = 0.08/5 * 120 = 1.9 -->
  <rect x="520" y="228" width="40" height="2" rx="2" fill="url(#barAfter)" filter="url(#pcShadow)"/>
  <text x="540" y="220" text-anchor="middle" fill="#a5f3fc" font-size="10" font-weight="700">0.08</text>
  <text x="540" y="244" text-anchor="middle" fill="#94a3b8" font-size="9">SDACS</text>
  <rect x="462" y="255" width="96" height="18" rx="5" fill="#0c4a6e" stroke="#22d3ee" stroke-width="1"/>
  <text x="510" y="268" text-anchor="middle" fill="#a5f3fc" font-size="9" font-weight="600">▼ −98.1%</text>

  <!-- ── Chart 4: 어드바이저리 P50 (s) ── -->
  <text x="730" y="105" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">어드바이저리 P50 (s)</text>
  <!-- Axis -->
  <line x1="650" y1="110" x2="650" y2="230" stroke="#334155" stroke-width="1.5"/>
  <line x1="650" y1="230" x2="810" y2="230" stroke="#334155" stroke-width="1.5"/>
  <!-- Y labels -->
  <text x="644" y="114" text-anchor="end" fill="#64748b" font-size="9">15</text>
  <text x="644" y="150" text-anchor="end" fill="#64748b" font-size="9">10</text>
  <text x="644" y="190" text-anchor="end" fill="#64748b" font-size="9">5</text>
  <text x="644" y="234" text-anchor="end" fill="#64748b" font-size="9">0</text>
  <!-- Grid -->
  <line x1="650" y1="150" x2="810" y2="150" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="650" y1="190" x2="810" y2="190" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Bar Before: 12s → height = 12/15 * 120 = 96 -->
  <rect x="670" y="134" width="40" height="96" rx="4" fill="url(#barBefore)" filter="url(#pcShadow)"/>
  <text x="690" y="128" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="700">12s</text>
  <text x="690" y="244" text-anchor="middle" fill="#94a3b8" font-size="9">기존</text>
  <!-- Bar After: 1.4s → height = 1.4/15 * 120 = 11.2 -->
  <rect x="720" y="219" width="40" height="11" rx="4" fill="url(#barAfter)" filter="url(#pcShadow)"/>
  <text x="740" y="212" text-anchor="middle" fill="#a5f3fc" font-size="10" font-weight="700">1.4s</text>
  <text x="740" y="244" text-anchor="middle" fill="#94a3b8" font-size="9">SDACS</text>
  <rect x="662" y="255" width="96" height="18" rx="5" fill="#0c4a6e" stroke="#22d3ee" stroke-width="1"/>
  <text x="710" y="268" text-anchor="middle" fill="#a5f3fc" font-size="9" font-weight="600">▼ −88.3%</text>

  <!-- ── Monte Carlo SLA Row ── -->
  <rect x="40" y="295" width="920" height="62" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#pcShadow)"/>
  <text x="500" y="315" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">Monte Carlo SLA 달성 현황 (38,400 runs)</text>

  <!-- SLA items -->
  <!-- Collision rate -->
  <rect x="58" y="325" width="130" height="24" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.2"/>
  <text x="123" y="341" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">✅ 충돌 0건/1000h</text>
  <!-- Near-miss -->
  <rect x="200" y="325" width="130" height="24" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.2"/>
  <text x="265" y="341" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">✅ Near-miss ≤0.1</text>
  <!-- Resolution -->
  <rect x="342" y="325" width="130" height="24" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.2"/>
  <text x="407" y="341" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">✅ 해결률 99.7%</text>
  <!-- Route efficiency -->
  <rect x="484" y="325" width="130" height="24" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.2"/>
  <text x="549" y="341" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">✅ 경로효율 1.09x</text>
  <!-- Advisory P50 -->
  <rect x="626" y="325" width="130" height="24" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.2"/>
  <text x="691" y="341" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">✅ P50 1.4s ≤2.0s</text>
  <!-- Intrusion P90 -->
  <rect x="768" y="325" width="130" height="24" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.2"/>
  <text x="833" y="341" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">✅ 탐지P90 3.2s</text>

  <!-- ── Throughput line chart ── -->
  <text x="500" y="384" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">드론 처리량 vs 밀도 (대/km²)</text>

  <!-- Axis -->
  <line x1="60" y1="390" x2="60" y2="450" stroke="#334155" stroke-width="1.2"/>
  <line x1="60" y1="450" x2="940" y2="450" stroke="#334155" stroke-width="1.2"/>
  <!-- X ticks -->
  <text x="100"  y="462" text-anchor="middle" fill="#64748b" font-size="9">10</text>
  <text x="240"  y="462" text-anchor="middle" fill="#64748b" font-size="9">25</text>
  <text x="380"  y="462" text-anchor="middle" fill="#64748b" font-size="9">50</text>
  <text x="520"  y="462" text-anchor="middle" fill="#64748b" font-size="9">75</text>
  <text x="660"  y="462" text-anchor="middle" fill="#64748b" font-size="9">100</text>
  <text x="800"  y="462" text-anchor="middle" fill="#64748b" font-size="9">150</text>
  <text x="940"  y="462" text-anchor="middle" fill="#64748b" font-size="9">대/km²</text>
  <!-- Y labels -->
  <text x="54" y="394" text-anchor="end" fill="#64748b" font-size="9">100%</text>
  <text x="54" y="422" text-anchor="end" fill="#64748b" font-size="9">50%</text>
  <text x="54" y="454" text-anchor="end" fill="#64748b" font-size="9">0%</text>

  <!-- Before line (red): degrades with density -->
  <!-- points at density 10→25→50→75→100→150: 90→82→65→45→22→8 -->
  <!-- y = 450 - val/100 * 60 -->
  <polyline points="100,396 240,401 380,411 520,423 660,437 800,445"
    fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3" opacity="0.8"/>
  <!-- After line (cyan): stays high -->
  <!-- points: 99→98→97→95→92→88 -->
  <polyline points="100,391 240,391 380,392 520,393 660,394 800,397"
    fill="none" stroke="#22d3ee" stroke-width="2.5" opacity="0.9"/>

  <!-- Dots Before -->
  <circle cx="100" cy="396" r="4" fill="#ef4444"/>
  <circle cx="240" cy="401" r="4" fill="#ef4444"/>
  <circle cx="380" cy="411" r="4" fill="#ef4444"/>
  <circle cx="520" cy="423" r="4" fill="#ef4444"/>
  <circle cx="660" cy="437" r="4" fill="#ef4444"/>
  <circle cx="800" cy="445" r="4" fill="#ef4444"/>
  <!-- Dots After -->
  <circle cx="100" cy="391" r="4" fill="#22d3ee"/>
  <circle cx="240" cy="391" r="4" fill="#22d3ee"/>
  <circle cx="380" cy="392" r="4" fill="#22d3ee"/>
  <circle cx="520" cy="393" r="4" fill="#22d3ee"/>
  <circle cx="660" cy="394" r="4" fill="#22d3ee"/>
  <circle cx="800" cy="397" r="4" fill="#22d3ee"/>

  <!-- gap annotation -->
  <line x1="800" y1="397" x2="800" y2="445" stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="810" y="422" fill="#fbbf24" font-size="9">gap</text>
  <text x="810" y="432" fill="#fbbf24" font-size="8">80%p</text>

  <text x="500" y="475" text-anchor="middle" fill="#475569" font-size="10">SDACS 시뮬레이션 기반 벤치마크 · 38,400 Monte Carlo 실행 결과</text>
</svg>
