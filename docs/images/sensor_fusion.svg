<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" width="900" height="440" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bgSF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="fusionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <marker id="sfArr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="sfArrBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="sfArrGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="sfArrOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
    <filter id="sfShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="900" height="440" fill="url(#bgSF)" rx="18"/>

  <text x="450" y="38" text-anchor="middle" fill="#f1f5f9" font-size="19" font-weight="800">센서 퓨전 프로세스</text>
  <text x="450" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">Camera (YOLO) + LiDAR + RF Scanner → Kalman Filter Fusion</text>

  <!-- ── Sensor Column ── -->

  <!-- Camera -->
  <rect x="30" y="80" width="160" height="90" rx="12" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2" filter="url(#sfShadow)"/>
  <text x="110" y="108" text-anchor="middle" fill="#60a5fa" font-size="32">📷</text>
  <text x="110" y="132" text-anchor="middle" fill="#bfdbfe" font-size="13" font-weight="700">카메라 (YOLO)</text>
  <text x="110" y="150" text-anchor="middle" fill="#93c5fd" font-size="10">객체 탐지 · 분류</text>
  <text x="110" y="163" text-anchor="middle" fill="#60a5fa" font-size="9">30 fps · 640×480</text>

  <!-- LiDAR -->
  <rect x="30" y="190" width="160" height="90" rx="12" fill="#064e3b" stroke="#10b981" stroke-width="2" filter="url(#sfShadow)"/>
  <text x="110" y="218" text-anchor="middle" fill="#34d399" font-size="32">📡</text>
  <text x="110" y="242" text-anchor="middle" fill="#d1fae5" font-size="13" font-weight="700">LiDAR</text>
  <text x="110" y="260" text-anchor="middle" fill="#6ee7b7" font-size="10">3D 포인트클라우드</text>
  <text x="110" y="273" text-anchor="middle" fill="#34d399" font-size="9">10 Hz · 360° 스캔</text>

  <!-- RF -->
  <rect x="30" y="300" width="160" height="90" rx="12" fill="#431407" stroke="#f97316" stroke-width="2" filter="url(#sfShadow)"/>
  <text x="110" y="328" text-anchor="middle" fill="#fb923c" font-size="32">📻</text>
  <text x="110" y="352" text-anchor="middle" fill="#fed7aa" font-size="13" font-weight="700">RF 스캐너</text>
  <text x="110" y="370" text-anchor="middle" fill="#fdba74" font-size="10">드론 신호 스펙트럼</text>
  <text x="110" y="383" text-anchor="middle" fill="#fb923c" font-size="9">2.4 / 5.8 GHz</text>

  <!-- ── Preprocessing Column ── -->

  <!-- Camera preproc -->
  <rect x="240" y="90" width="140" height="70" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="310" y="115" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">바운딩박스 → 거리</text>
  <text x="310" y="132" text-anchor="middle" fill="#60a5fa" font-size="10">핀홀 카메라 모델</text>
  <text x="310" y="148" text-anchor="middle" fill="#475569" font-size="9">confidence ≥ 0.7</text>

  <!-- LiDAR preproc -->
  <rect x="240" y="200" width="140" height="70" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.2"/>
  <text x="310" y="225" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">클러스터링 → 중심점</text>
  <text x="310" y="242" text-anchor="middle" fill="#34d399" font-size="10">DBSCAN 군집화</text>
  <text x="310" y="258" text-anchor="middle" fill="#475569" font-size="9">min_pts=5  ε=0.3m</text>

  <!-- RF preproc -->
  <rect x="240" y="310" width="140" height="70" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="1.2"/>
  <text x="310" y="335" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="600">신호 강도 → 거리</text>
  <text x="310" y="352" text-anchor="middle" fill="#fb923c" font-size="10">RSSI 삼변측량</text>
  <text x="310" y="368" text-anchor="middle" fill="#475569" font-size="9">Remote ID 파싱</text>

  <!-- Arrows: Sensor → Preproc -->
  <line x1="191" y1="125" x2="238" y2="125" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#sfArrBlue)"/>
  <line x1="191" y1="235" x2="238" y2="235" stroke="#10b981" stroke-width="1.8" marker-end="url(#sfArrGreen)"/>
  <line x1="191" y1="345" x2="238" y2="345" stroke="#f97316" stroke-width="1.8" marker-end="url(#sfArrOrange)"/>

  <!-- Arrows: Preproc → Kalman -->
  <line x1="380" y1="125" x2="474" y2="220" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#sfArrBlue)"/>
  <line x1="380" y1="235" x2="474" y2="245" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#sfArrGreen)"/>
  <line x1="380" y1="345" x2="474" y2="272" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#sfArrOrange)"/>

  <!-- ── Kalman Filter Box ── -->
  <rect x="475" y="160" width="165" height="170" rx="14" fill="url(#fusionGrad)" stroke="#8b5cf6" stroke-width="2.5" filter="url(#sfShadow)"/>
  <text x="557" y="188" text-anchor="middle" fill="#ede9fe" font-size="13" font-weight="800">🔮 칼만 필터</text>
  <text x="557" y="206" text-anchor="middle" fill="#c4b5fd" font-size="10">Kalman Filter Fusion</text>
  <line x1="490" y1="215" x2="624" y2="215" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
  <text x="557" y="232" text-anchor="middle" fill="#ddd6fe" font-size="10" font-weight="600">📐 예측 단계</text>
  <text x="557" y="248" text-anchor="middle" fill="#c4b5fd" font-size="9">x̂ₖ = Fxₖ₋₁ + Buₖ</text>
  <text x="557" y="264" text-anchor="middle" fill="#c4b5fd" font-size="9">Pₖ = FPₖ₋₁Fᵀ + Q</text>
  <line x1="490" y1="275" x2="624" y2="275" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
  <text x="557" y="292" text-anchor="middle" fill="#ddd6fe" font-size="10" font-weight="600">🔄 업데이트 단계</text>
  <text x="557" y="308" text-anchor="middle" fill="#c4b5fd" font-size="9">K = PₖHᵀ(HPₖHᵀ+R)⁻¹</text>
  <text x="557" y="322" text-anchor="middle" fill="#c4b5fd" font-size="9">x̂ₖ = x̂ₖ + K(zₖ - Hx̂ₖ)</text>

  <!-- Arrow: Kalman → Output -->
  <line x1="641" y1="245" x2="700" y2="245" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#sfArr)"/>

  <!-- ── Output Column ── -->
  <rect x="702" y="130" width="172" height="82" rx="12" fill="#1a1a3e" stroke="#6366f1" stroke-width="2" filter="url(#sfShadow)"/>
  <text x="788" y="155" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="700">📍 융합 위치 추정</text>
  <text x="788" y="173" text-anchor="middle" fill="#818cf8" font-size="10">x, y, z ± 0.3m</text>
  <text x="788" y="189" text-anchor="middle" fill="#6366f1" font-size="9">공분산 P 포함 출력</text>
  <text x="788" y="203" text-anchor="middle" fill="#475569" font-size="9">100 Hz 업데이트</text>

  <rect x="702" y="228" width="172" height="82" rx="12" fill="#1a1a3e" stroke="#6366f1" stroke-width="2" filter="url(#sfShadow)"/>
  <text x="788" y="253" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="700">🚀 속도 · 진행방향</text>
  <text x="788" y="271" text-anchor="middle" fill="#818cf8" font-size="10">vx, vy, vz · heading</text>
  <text x="788" y="287" text-anchor="middle" fill="#6366f1" font-size="9">APF 입력 데이터</text>
  <text x="788" y="301" text-anchor="middle" fill="#475569" font-size="9">CPA 계산 사용</text>

  <rect x="702" y="326" width="172" height="72" rx="12" fill="#1a2e0a" stroke="#4ade80" stroke-width="2" filter="url(#sfShadow)"/>
  <text x="788" y="351" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700">✅ 위협 판별 결과</text>
  <text x="788" y="369" text-anchor="middle" fill="#4ade80" font-size="10">ROGUE / FRIENDLY</text>
  <text x="788" y="385" text-anchor="middle" fill="#475569" font-size="9">신뢰도 score 0~1</text>

  <!-- Arrows: Kalman → Outputs -->
  <line x1="641" y1="215" x2="700" y2="175" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#sfArr)"/>
  <line x1="641" y1="280" x2="700" y2="269" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#sfArr)"/>
  <line x1="641" y1="300" x2="700" y2="355" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#sfArr)"/>

  <!-- Bottom note -->
  <rect x="30" y="408" width="840" height="24" rx="7" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="450" y="424" text-anchor="middle" fill="#64748b" font-size="10">
    가중 평균 · Q = 프로세스 노이즈 · R = 측정 노이즈 · 출력: APF 엔진 / CPA 충돌스캔 / IntrusionAlert 연동
  </text>
</svg>
