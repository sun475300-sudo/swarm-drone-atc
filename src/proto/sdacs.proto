// SDACS Protocol Buffers 정의
// ============================
// 드론 ↔ 관제 ↔ 대시보드 간 직렬화 프로토콜
// gRPC 서비스 인터페이스 정의

syntax = "proto3";

package sdacs;

option go_package = "github.com/sdacs/proto";
option java_package = "com.sdacs.proto";

// ── 기본 메시지 ─────────────────────────────────────────

message Vec3 {
  double x = 1;
  double y = 2;
  double z = 3;
}

message Timestamp {
  int64 unix_ms = 1;
}

// ── 드론 텔레메트리 ────────────────────────────────────

message Telemetry {
  string drone_id = 1;
  Vec3 position = 2;
  Vec3 velocity = 3;
  double heading_deg = 4;
  double battery_pct = 5;
  double speed_ms = 6;
  DroneStatus status = 7;
  Timestamp timestamp = 8;
  int32 gps_satellites = 9;
  double signal_strength = 10;
  Vec3 acceleration = 11;
  repeated double motor_rpm = 12;
}

enum DroneStatus {
  DRONE_UNKNOWN = 0;
  DRONE_IDLE = 1;
  DRONE_PREFLIGHT = 2;
  DRONE_ARMED = 3;
  DRONE_TAKEOFF = 4;
  DRONE_CRUISE = 5;
  DRONE_LANDING = 6;
  DRONE_EMERGENCY = 7;
  DRONE_GROUNDED = 8;
  DRONE_RTL = 9;
}

// ── 충돌 감지 ──────────────────────────────────────────

message ConflictReport {
  string conflict_id = 1;
  string drone_a = 2;
  string drone_b = 3;
  double cpa_distance_m = 4;
  double cpa_time_sec = 5;
  Vec3 position_a = 6;
  Vec3 position_b = 7;
  ConflictSeverity severity = 8;
  Timestamp timestamp = 9;
}

enum ConflictSeverity {
  SEVERITY_UNKNOWN = 0;
  SEVERITY_LOW = 1;
  SEVERITY_MEDIUM = 2;
  SEVERITY_HIGH = 3;
  SEVERITY_CRITICAL = 4;
}

// ── 관제 명령 ──────────────────────────────────────────

message ResolutionAdvisory {
  string advisory_id = 1;
  string drone_id = 2;
  AdvisoryManeuver maneuver = 3;
  double magnitude = 4;
  AdvisoryUrgency urgency = 5;
  string conflict_drone_id = 6;
  Timestamp expires_at = 7;
}

enum AdvisoryManeuver {
  MANEUVER_UNKNOWN = 0;
  MANEUVER_CLIMB = 1;
  MANEUVER_DESCEND = 2;
  MANEUVER_TURN_LEFT = 3;
  MANEUVER_TURN_RIGHT = 4;
  MANEUVER_SPEED_UP = 5;
  MANEUVER_SLOW_DOWN = 6;
  MANEUVER_HOLD = 7;
}

enum AdvisoryUrgency {
  URGENCY_UNKNOWN = 0;
  URGENCY_PREVENTIVE = 1;
  URGENCY_CORRECTIVE = 2;
  URGENCY_IMMEDIATE = 3;
}

message NavigationCommand {
  string drone_id = 1;
  CommandType command_type = 2;
  Vec3 target_position = 3;
  double speed = 4;
  double altitude = 5;
  int32 priority = 6;
}

enum CommandType {
  CMD_UNKNOWN = 0;
  CMD_GOTO = 1;
  CMD_ORBIT = 2;
  CMD_RTL = 3;
  CMD_HOLD = 4;
  CMD_LAND = 5;
  CMD_TAKEOFF = 6;
}

// ── KPI 스냅샷 ─────────────────────────────────────────

message KPISnapshot {
  int32 active_drones = 1;
  int32 total_conflicts = 2;
  int32 resolved_conflicts = 3;
  double collision_rate = 4;
  double avg_battery = 5;
  double throughput = 6;
  double p50_latency_ms = 7;
  double p99_latency_ms = 8;
  string overall_health = 9;
  Timestamp timestamp = 10;
}

// ── 시뮬레이션 설정 ────────────────────────────────────

message SimulationConfig {
  int32 drone_count = 1;
  double duration_sec = 2;
  double wind_speed = 3;
  double failure_rate = 4;
  int64 seed = 5;
  string scenario_name = 6;
  map<string, double> params = 7;
}

message SimulationResult {
  string scenario_name = 1;
  int32 drone_count = 2;
  double duration_sec = 3;
  int32 total_conflicts = 4;
  int32 total_collisions = 5;
  double collision_rate = 6;
  double resolution_rate = 7;
  double avg_response_ms = 8;
  double p50_latency_ms = 9;
  double p99_latency_ms = 10;
  double avg_battery = 11;
  double min_separation = 12;
  bool sla_pass = 13;
}

// ── gRPC 서비스 ────────────────────────────────────────

service AirspaceControl {
  // 텔레메트리 스트림 (드론 → 관제)
  rpc StreamTelemetry(stream Telemetry) returns (stream ResolutionAdvisory);

  // 명령 전송 (관제 → 드론)
  rpc SendCommand(NavigationCommand) returns (CommandAck);

  // KPI 구독
  rpc SubscribeKPI(KPIRequest) returns (stream KPISnapshot);

  // 충돌 이벤트 구독
  rpc SubscribeConflicts(ConflictRequest) returns (stream ConflictReport);

  // 시뮬레이션 실행
  rpc RunSimulation(SimulationConfig) returns (SimulationResult);

  // 드론 등록
  rpc RegisterDrone(DroneRegistration) returns (RegistrationAck);
}

message CommandAck {
  bool success = 1;
  string message = 2;
}

message KPIRequest {
  int32 interval_ms = 1;
}

message ConflictRequest {
  ConflictSeverity min_severity = 1;
}

message DroneRegistration {
  string drone_id = 1;
  string drone_type = 2;
  string owner_id = 3;
  double max_speed_ms = 4;
  double battery_wh = 5;
}

message RegistrationAck {
  bool success = 1;
  string certificate = 2;
  string message = 3;
}
