<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDACS — 군집드론 공역통제 3D 시뮬레이터</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #010409; overflow: hidden; font-family: 'Inter','Malgun Gothic',sans-serif; color: #c9d1d9; }

/* Layout */
.app { display: flex; flex-direction: column; height: 100vh; }
.header {
  background: #0d1117; padding: 10px 20px;
  border-bottom: 1px solid #21262d;
  display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
}
.header-title { color: #58a6ff; font-size: 16px; font-weight: 700; }
.header-sub { color: #6e7681; font-size: 13px; }
.header-time { color: #8b949e; font-size: 13px; font-family: 'JetBrains Mono', monospace; }

.main { display: flex; flex: 1; overflow: hidden; }

/* Side panel */
.sidebar {
  width: 260px; background: #0d1117; padding: 14px;
  border-right: 1px solid #21262d; overflow-y: auto; flex-shrink: 0;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: #21262d; border-radius: 2px; }

/* Buttons */
.btn-group { display: flex; gap: 6px; margin-bottom: 14px; }
.btn {
  border: none; border-radius: 6px; padding: 8px 16px;
  font-size: 12px; font-weight: 600; cursor: pointer; color: #fff;
  font-family: 'Inter', sans-serif; transition: opacity 0.2s;
}
.btn:hover { opacity: 0.85; }
.btn-start { background: #238636; flex: 1; }
.btn-pause { background: #6e40c9; width: 36px; }
.btn-reset { background: #b62324; width: 36px; }

/* Controls */
.ctrl-label { color: #8b949e; font-size: 11px; display: block; margin-bottom: 4px; }
.ctrl-group { margin-bottom: 12px; }
input[type="range"] {
  width: 100%; -webkit-appearance: none; background: #21262d;
  height: 4px; border-radius: 2px; outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: #58a6ff; cursor: pointer;
}
select {
  width: 100%; background: #161b22; color: #c9d1d9;
  border: 1px solid #30363d; border-radius: 6px;
  padding: 6px 8px; font-size: 11px; outline: none;
}
.range-labels { display: flex; justify-content: space-between; font-size: 9px; color: #484f58; margin-top: 2px; }

label.check {
  display: flex; align-items: center; gap: 6px;
  color: #c9d1d9; font-size: 11px; cursor: pointer; margin-top: 10px;
}
label.check input { accent-color: #58a6ff; }

.divider { border: none; border-top: 1px solid #21262d; margin: 14px 0; }

/* Stats */
.section-title { color: #58a6ff; font-size: 12px; font-weight: 600; margin-bottom: 8px; }
.stat-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 11px; }
.stat-row .val { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
.stat-row .val.warn { color: #d29922; }

/* Legend */
.legend-row { display: flex; align-items: center; gap: 8px; padding: 2px 0; font-size: 11px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* 3D viewport */
#canvas-container { flex: 1; position: relative; }
canvas { display: block; }

/* Alert bar */
.alert-bar {
  background: #0d1117; border-top: 1px solid #21262d;
  padding: 6px 16px; font-size: 11px; font-family: monospace;
  color: #8b949e; flex-shrink: 0; height: 28px; overflow: hidden; white-space: nowrap;
}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div>
      <span style="font-size:20px;">&#x1f6f8; </span>
      <span class="header-title">군집드론 공역통제 자동화 시스템</span>
      <span class="header-sub"> — 3D 실시간 시뮬레이터 (Standalone)</span>
    </div>
    <div class="header-time" id="hdr-time">T+00:00 | ⏸ 일시정지</div>
  </div>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="btn-group">
        <button class="btn btn-start" id="btn-start">▶ 시작</button>
        <button class="btn btn-pause" id="btn-pause">⏸</button>
        <button class="btn btn-reset" id="btn-reset">↺</button>
      </div>

      <div class="ctrl-group">
        <label class="ctrl-label">드론 수: <span id="drone-count-val">30</span></label>
        <input type="range" id="slider-drones" min="10" max="100" step="10" value="30">
        <div class="range-labels"><span>10</span><span>30</span><span>50</span><span>80</span><span>100</span></div>
      </div>

      <div class="ctrl-group">
        <label class="ctrl-label">시나리오</label>
        <select id="sel-scenario">
          <option value="default">기본 (랜덤)</option>
          <option value="high_density">고밀도 교통</option>
          <option value="emergency">비상 장애</option>
          <option value="mass_takeoff">동시 이착륙</option>
          <option value="route_conflict">경로 충돌</option>
        </select>
      </div>

      <label class="check">
        <input type="checkbox" id="chk-wind"> 🌬 바람 (2 m/s 동남풍)
      </label>

      <div class="ctrl-group" style="margin-top:14px;">
        <label class="ctrl-label">⏩ 시뮬레이션 속도: <span id="speed-val">1.0</span>x</label>
        <input type="range" id="slider-speed" min="0.25" max="5" step="0.25" value="1">
        <div class="range-labels"><span>0.25x</span><span>1x</span><span>2x</span><span>3x</span><span>5x</span></div>
      </div>

      <hr class="divider">

      <div class="section-title">📊 실시간 통계</div>
      <div id="stats">
        <div class="stat-row"><span>전체 드론</span><span class="val" id="s-total">0</span></div>
        <div class="stat-row"><span>활성</span><span class="val" id="s-active">0</span></div>
        <div class="stat-row"><span>회피 기동</span><span class="val" id="s-evading">0</span></div>
        <div class="stat-row"><span>충돌 경보</span><span class="val" id="s-conflicts">0</span></div>
        <div class="stat-row"><span>근접 경고</span><span class="val" id="s-nearmiss">0</span></div>
        <div class="stat-row"><span>실제 충돌</span><span class="val" id="s-collisions">0</span></div>
        <div class="stat-row"><span>어드바이저리</span><span class="val" id="s-advisories">0</span></div>
        <div class="stat-row"><span>평균 배터리</span><span class="val" id="s-battery">0 %</span></div>
      </div>

      <hr class="divider">
      <div class="section-title">🎨 비행 단계 범례</div>
      <div id="legend"></div>
    </div>

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>
  </div>

  <!-- Alert bar -->
  <div class="alert-bar" id="alert-bar">경보 없음</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════════════
// Config — matches simulator_3d.py
// ═══════════════════════════════════════════════════════
const BOUNDS_M = 5000;
const ALT_MAX = 160;
const CRUISE_ALT = 60;
const NFZ_X = [-600, 600];
const NFZ_Y = [-600, 600];
const NFZ_Z = [0, 120];
const CORRIDOR_ROUTES = [
  { dir: 'EW', alt: 60, width: 200, color: 0x4488ff },
  { dir: 'NS', alt: 80, width: 200, color: 0x44ff88 },
];
const PAD_POSITIONS = [
  [2000, 2000, 0], [-2000, 2000, 0], [2000, -2000, 0], [-2000, -2000, 0],
  [0, 3000, 0], [3000, 0, 0], [0, -3000, 0], [-3000, 0, 0],
];

const FlightPhase = {
  GROUNDED: 0, TAKEOFF: 1, ENROUTE: 2, HOLDING: 3,
  RTL: 4, LANDING: 5, EVADING: 6, FAILED: 7,
};
const PHASE_NAMES = ['지상 대기','이륙','비행 중','대기','복귀','착륙','회피 기동','실패'];
const PHASE_COLORS_HEX = ['#8b949e','#f0883e','#3fb950','#d2a8ff','#79c0ff','#56d364','#f47067','#f85149'];
const PHASE_COLORS_INT = [0x8b949e, 0xf0883e, 0x3fb950, 0xd2a8ff, 0x79c0ff, 0x56d364, 0xf47067, 0xf85149];

// ═══════════════════════════════════════════════════════
// Simulation State
// ═══════════════════════════════════════════════════════
class Drone {
  constructor(id, pos, goal, profile, battery) {
    this.id = id;
    this.pos = new Float64Array(pos);
    this.vel = new Float64Array([0, 0, 0]);
    this.goal = new Float64Array(goal);
    this.phase = FlightPhase.GROUNDED;
    this.profile = profile;
    this.battery = battery;
    this.speed = 0;
    this.isActive = true;
    this.evadeEnd = null;
    this.holdStart = null;
    this.trail = [];
  }
}

const state = {
  drones: [],
  t: 0, dt: 0.1,
  running: false,
  wind: [0, 0, 0],
  speedMul: 1,
  conflicts: 0, nearMisses: 0, advisories: 0, collisions: 0,
};

function rng() { return Math.random(); }
function rngRange(a, b) { return a + rng() * (b - a); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function dist3(a, b) {
  const dx = a[0]-b[0], dy = a[1]-b[1], dz = a[2]-b[2];
  return Math.sqrt(dx*dx + dy*dy + dz*dz);
}
function norm3(v) { return Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2]); }

function resetSim(nDrones) {
  const profiles = ['DELIVERY','SURVEY','EMERGENCY','RECREATIONAL'];
  const weights = [0.55, 0.25, 0.10, 0.10];
  state.drones = [];
  state.t = 0;
  state.conflicts = 0; state.nearMisses = 0;
  state.advisories = 0; state.collisions = 0;

  for (let i = 0; i < nDrones; i++) {
    const pad = PAD_POSITIONS[i % PAD_POSITIONS.length].slice();
    const jx = rngRange(-300, 300), jy = rngRange(-300, 300);
    const sx = clamp(pad[0] + jx, -BOUNDS_M+200, BOUNDS_M-200);
    const sy = clamp(pad[1] + jy, -BOUNDS_M+200, BOUNDS_M-200);

    const gPad = PAD_POSITIONS[(i + 4) % PAD_POSITIONS.length].slice();
    let gx = gPad[0], gy = gPad[1], gz = CRUISE_ALT;
    if (Math.abs(gx) < 700 && Math.abs(gy) < 700) gx += (rng() > 0.5 ? 900 : -900);

    // Weighted profile
    let r = rng(), cum = 0, prof = profiles[0];
    for (let p = 0; p < weights.length; p++) {
      cum += weights[p];
      if (r <= cum) { prof = profiles[p]; break; }
    }

    const d = new Drone(
      `DR${String(i).padStart(3,'0')}`,
      [sx, sy, 0], [gx, gy, gz], prof,
      rngRange(70, 100)
    );
    state.drones.push(d);
  }
}

// ═══════════════════════════════════════════════════════
// Simulation Step — simplified physics matching SDACS
// ═══════════════════════════════════════════════════════
function inNFZ(p) {
  return p[0] > NFZ_X[0] && p[0] < NFZ_X[1] && p[1] > NFZ_Y[0] && p[1] < NFZ_Y[1] && p[2] < NFZ_Z[1];
}

function simStep() {
  const dt = state.dt;
  state.t += dt;

  for (const d of state.drones) {
    if (!d.isActive) continue;
    d.battery -= dt * 0.02;
    if (d.battery <= 0) { d.battery = 0; d.phase = FlightPhase.FAILED; d.isActive = false; continue; }

    // State machine
    switch (d.phase) {
      case FlightPhase.GROUNDED: {
        // Staggered takeoff
        const idx = parseInt(d.id.slice(2));
        if (state.t > idx * 0.5) d.phase = FlightPhase.TAKEOFF;
        break;
      }
      case FlightPhase.TAKEOFF: {
        const tgtAlt = CRUISE_ALT + rngRange(-5, 5);
        d.vel[2] = 8;
        d.pos[2] += d.vel[2] * dt;
        if (d.pos[2] >= tgtAlt) { d.pos[2] = tgtAlt; d.phase = FlightPhase.ENROUTE; }
        break;
      }
      case FlightPhase.ENROUTE: {
        // Move toward goal
        const dx = d.goal[0] - d.pos[0], dy = d.goal[1] - d.pos[1], dz = d.goal[2] - d.pos[2];
        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
        if (dist < 50) {
          d.phase = FlightPhase.RTL;
          break;
        }
        const spd = d.profile === 'EMERGENCY' ? 20 : (d.profile === 'DELIVERY' ? 15 : 12);
        d.vel[0] = (dx/dist) * spd;
        d.vel[1] = (dy/dist) * spd;
        d.vel[2] = (dz/dist) * Math.min(spd, 5);

        // Add wind
        d.vel[0] += state.wind[0] * 0.1;
        d.vel[1] += state.wind[1] * 0.1;

        d.pos[0] += d.vel[0] * dt;
        d.pos[1] += d.vel[1] * dt;
        d.pos[2] += d.vel[2] * dt;

        // NFZ avoidance
        if (inNFZ(d.pos)) {
          d.pos[0] += (d.pos[0] > 0 ? 15 : -15) * dt;
          d.pos[1] += (d.pos[1] > 0 ? 15 : -15) * dt;
        }
        break;
      }
      case FlightPhase.EVADING: {
        // APF-like repulsion from nearby drones
        let fx = 0, fy = 0, fz = 0;
        for (const other of state.drones) {
          if (other === d || !other.isActive) continue;
          const sep = dist3(d.pos, other.pos);
          if (sep < 200 && sep > 0.1) {
            const strength = 800 / (sep * sep);
            fx += (d.pos[0] - other.pos[0]) / sep * strength;
            fy += (d.pos[1] - other.pos[1]) / sep * strength;
            fz += (d.pos[2] - other.pos[2]) / sep * strength;
          }
        }
        d.vel[0] += fx * dt;
        d.vel[1] += fy * dt;
        d.vel[2] += fz * dt;

        // Also move toward goal gently
        const dx2 = d.goal[0]-d.pos[0], dy2 = d.goal[1]-d.pos[1];
        const dist2 = Math.sqrt(dx2*dx2+dy2*dy2);
        if (dist2 > 1) {
          d.vel[0] += (dx2/dist2) * 3 * dt;
          d.vel[1] += (dy2/dist2) * 3 * dt;
        }

        d.pos[0] += d.vel[0] * dt;
        d.pos[1] += d.vel[1] * dt;
        d.pos[2] += d.vel[2] * dt;
        d.pos[2] = clamp(d.pos[2], 10, ALT_MAX);

        if (d.evadeEnd !== null && state.t > d.evadeEnd) {
          d.phase = FlightPhase.ENROUTE;
          d.evadeEnd = null;
        }
        break;
      }
      case FlightPhase.HOLDING: {
        // Hover in place
        d.vel[0] *= 0.9; d.vel[1] *= 0.9; d.vel[2] *= 0.9;
        if (d.holdStart === null) d.holdStart = state.t;
        if (state.t - d.holdStart > 10) {
          d.phase = FlightPhase.ENROUTE;
          d.holdStart = null;
        }
        break;
      }
      case FlightPhase.RTL: {
        // Return to nearest pad
        const pad = PAD_POSITIONS[parseInt(d.id.slice(2)) % PAD_POSITIONS.length];
        const dx = pad[0]-d.pos[0], dy = pad[1]-d.pos[1];
        const dist = Math.sqrt(dx*dx+dy*dy);
        if (dist < 30) { d.phase = FlightPhase.LANDING; break; }
        const spd = 12;
        d.vel[0] = (dx/dist)*spd; d.vel[1] = (dy/dist)*spd;
        d.pos[0] += d.vel[0]*dt; d.pos[1] += d.vel[1]*dt;
        break;
      }
      case FlightPhase.LANDING: {
        d.vel[2] = -5;
        d.pos[2] += d.vel[2] * dt;
        if (d.pos[2] <= 0) {
          d.pos[2] = 0; d.phase = FlightPhase.GROUNDED;
          d.isActive = false;
        }
        break;
      }
    }

    d.speed = norm3(d.vel);
    d.pos[0] = clamp(d.pos[0], -BOUNDS_M, BOUNDS_M);
    d.pos[1] = clamp(d.pos[1], -BOUNDS_M, BOUNDS_M);
    d.pos[2] = clamp(d.pos[2], 0, ALT_MAX + 20);

    // Trail
    d.trail.push([d.pos[0], d.pos[1], d.pos[2]]);
    if (d.trail.length > 40) d.trail.shift();
  }

  // Conflict detection + resolution
  const active = state.drones.filter(d => d.isActive && d.phase >= FlightPhase.TAKEOFF);
  for (let i = 0; i < active.length; i++) {
    for (let j = i+1; j < active.length; j++) {
      const sep = dist3(active[i].pos, active[j].pos);
      if (sep < 30) {
        state.collisions++;
      } else if (sep < 80) {
        state.nearMisses++;
      } else if (sep < 150) {
        state.conflicts++;
        // Trigger evasion
        if (active[i].phase === FlightPhase.ENROUTE || active[i].phase === FlightPhase.EVADING) {
          active[i].phase = FlightPhase.EVADING;
          const newEnd = state.t + 10;
          if (active[i].evadeEnd === null || newEnd > active[i].evadeEnd) active[i].evadeEnd = newEnd;
          state.advisories++;
        }
        if (active[j].phase === FlightPhase.ENROUTE || active[j].phase === FlightPhase.EVADING) {
          active[j].phase = FlightPhase.EVADING;
          const newEnd = state.t + 10;
          if (active[j].evadeEnd === null || newEnd > active[j].evadeEnd) active[j].evadeEnd = newEnd;
          state.advisories++;
        }
      }
    }
  }
}

// ═══════════════════════════════════════════════════════
// Three.js Scene
// ═══════════════════════════════════════════════════════
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x010409, 0.00008);

const camera = new THREE.PerspectiveCamera(55, container.clientWidth / container.clientHeight, 1, 20000);
camera.position.set(6000, 5000, 8000);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x010409);
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, CRUISE_ALT/2, 0);
controls.minDistance = 500;
controls.maxDistance = 15000;

// Lighting
scene.add(new THREE.AmbientLight(0x334466, 0.6));
const dirLight = new THREE.DirectionalLight(0x88aacc, 0.8);
dirLight.position.set(3000, 5000, 3000);
scene.add(dirLight);

// ─── Ground Grid ───
const S = BOUNDS_M;
const gridMat = new THREE.LineBasicMaterial({ color: 0x21262d, transparent: true, opacity: 0.5 });
for (let i = -S; i <= S; i += 500) {
  const pts1 = [new THREE.Vector3(i, 0, -S), new THREE.Vector3(i, 0, S)];
  const pts2 = [new THREE.Vector3(-S, 0, i), new THREE.Vector3(S, 0, i)];
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts1), gridMat));
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts2), gridMat));
}

// ─── NFZ (No-Fly Zone) ───
const nfzGeo = new THREE.BoxGeometry(
  NFZ_X[1]-NFZ_X[0], NFZ_Z[1]-NFZ_Z[0], NFZ_Y[1]-NFZ_Y[0]
);
const nfzMat = new THREE.MeshBasicMaterial({ color: 0xf85149, transparent: true, opacity: 0.12, side: THREE.DoubleSide });
const nfzMesh = new THREE.Mesh(nfzGeo, nfzMat);
nfzMesh.position.set(0, (NFZ_Z[1])/2, 0);
scene.add(nfzMesh);

// NFZ wireframe edges
const nfzEdge = new THREE.EdgesGeometry(nfzGeo);
const nfzLine = new THREE.LineSegments(nfzEdge, new THREE.LineBasicMaterial({ color: 0xf85149, transparent: true, opacity: 0.4 }));
nfzLine.position.copy(nfzMesh.position);
scene.add(nfzLine);

// NFZ label
const nfzLabel = createTextSprite('NFZ — 비행금지구역', '#f85149');
nfzLabel.position.set(0, NFZ_Z[1] + 20, 0);
nfzLabel.scale.set(600, 150, 1);
scene.add(nfzLabel);

// ─── Corridors ───
CORRIDOR_ROUTES.forEach(c => {
  const mat = new THREE.LineBasicMaterial({ color: c.color, transparent: true, opacity: 0.3 });
  if (c.dir === 'EW') {
    const pts = [new THREE.Vector3(-S, c.alt, 0), new THREE.Vector3(S, c.alt, 0)];
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
  } else {
    const pts = [new THREE.Vector3(0, c.alt, -S), new THREE.Vector3(0, c.alt, S)];
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
  }
});

// ─── Landing Pads ───
PAD_POSITIONS.forEach(p => {
  const padGeo = new THREE.CylinderGeometry(60, 60, 2, 32);
  const padMat = new THREE.MeshBasicMaterial({ color: 0xf0883e, transparent: true, opacity: 0.6 });
  const pad = new THREE.Mesh(padGeo, padMat);
  pad.position.set(p[0], 1, p[1]);
  scene.add(pad);

  // Pad ring
  const ringGeo = new THREE.RingGeometry(55, 65, 32);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0xf0883e, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.set(p[0], 2, p[1]);
  scene.add(ring);
});

// ─── Drone Meshes ───
let droneMeshes = [];
let trailLines = [];

function createDroneMesh(phase) {
  const group = new THREE.Group();
  const color = PHASE_COLORS_INT[phase] || 0x8b949e;

  // Core sphere
  const core = new THREE.Mesh(
    new THREE.SphereGeometry(20, 12, 12),
    new THREE.MeshPhongMaterial({ color, emissive: color, emissiveIntensity: 0.5 })
  );
  group.add(core);

  // Arms
  const armGeo = new THREE.CylinderGeometry(2, 2, 50, 6);
  const armMat = new THREE.MeshPhongMaterial({ color: 0x6e7681 });
  for (let a = 0; a < 4; a++) {
    const arm = new THREE.Mesh(armGeo, armMat);
    arm.rotation.z = Math.PI / 2;
    arm.rotation.y = (a / 4) * Math.PI;
    group.add(arm);
  }

  // Glow sprite
  const glow = new THREE.Sprite(
    new THREE.SpriteMaterial({ color, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending })
  );
  glow.scale.set(80, 80, 1);
  group.add(glow);

  return group;
}

function rebuildDroneMeshes() {
  // Remove old
  droneMeshes.forEach(m => scene.remove(m));
  trailLines.forEach(l => scene.remove(l));
  droneMeshes = [];
  trailLines = [];

  state.drones.forEach((d, i) => {
    const mesh = createDroneMesh(d.phase);
    mesh.position.set(d.pos[0], d.pos[2], d.pos[1]); // Three.js Y = altitude
    scene.add(mesh);
    droneMeshes.push(mesh);

    // Trail line
    const trailGeo = new THREE.BufferGeometry();
    const trailMat = new THREE.LineBasicMaterial({ color: PHASE_COLORS_INT[d.phase], transparent: true, opacity: 0.3 });
    const trail = new THREE.Line(trailGeo, trailMat);
    scene.add(trail);
    trailLines.push(trail);
  });
}

function updateDroneMeshes() {
  state.drones.forEach((d, i) => {
    if (i >= droneMeshes.length) return;
    const mesh = droneMeshes[i];
    mesh.position.set(d.pos[0], d.pos[2], d.pos[1]);

    // Update color
    const color = new THREE.Color(PHASE_COLORS_INT[d.phase]);
    mesh.children[0].material.color.copy(color);
    mesh.children[0].material.emissive.copy(color);
    if (mesh.children[5]) mesh.children[5].material.color.copy(color);

    mesh.visible = d.isActive || d.phase === FlightPhase.GROUNDED;

    // Update trail
    if (i < trailLines.length && d.trail.length >= 2 && d.isActive) {
      const pts = d.trail.map(p => new THREE.Vector3(p[0], p[2], p[1]));
      trailLines[i].geometry.dispose();
      trailLines[i].geometry = new THREE.BufferGeometry().setFromPoints(pts);
      trailLines[i].material.color.copy(color);
      trailLines[i].visible = true;
    } else if (i < trailLines.length) {
      trailLines[i].visible = false;
    }
  });
}

// ─── Text Sprite Helper ───
function createTextSprite(text, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.font = 'bold 40px JetBrains Mono, monospace';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.fillText(text, 256, 70);
  const tex = new THREE.CanvasTexture(canvas);
  return new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
}

// ═══════════════════════════════════════════════════════
// UI Updates
// ═══════════════════════════════════════════════════════
function updateUI() {
  const active = state.drones.filter(d => d.isActive).length;
  const evading = state.drones.filter(d => d.phase === FlightPhase.EVADING).length;
  const avgBat = state.drones.length > 0
    ? (state.drones.reduce((s,d) => s+d.battery, 0) / state.drones.length).toFixed(0)
    : 0;

  document.getElementById('s-total').textContent = state.drones.length;
  document.getElementById('s-active').textContent = active;
  document.getElementById('s-evading').textContent = evading;
  document.getElementById('s-evading').className = evading > 0 ? 'val warn' : 'val';
  document.getElementById('s-conflicts').textContent = state.conflicts;
  document.getElementById('s-nearmiss').textContent = state.nearMisses;
  document.getElementById('s-collisions').textContent = state.collisions;
  document.getElementById('s-advisories').textContent = state.advisories;
  document.getElementById('s-battery').textContent = avgBat + ' %';

  const m = Math.floor(state.t / 60), s = Math.floor(state.t % 60);
  document.getElementById('hdr-time').textContent =
    `T+${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}  |  ${state.running ? '▶ 실행 중' : '⏸ 일시정지'}`;

  // Phase counts in stats
  const phaseCounts = new Array(8).fill(0);
  state.drones.forEach(d => phaseCounts[d.phase]++);

  // Alert bar
  const alerts = [];
  if (evading > 0) alerts.push(`회피기동 ${evading}기`);
  if (state.advisories > 0) alerts.push(`어드바이저리 ${state.advisories}건`);
  if (state.collisions > 0) alerts.push(`⚠ 충돌 ${state.collisions}건`);
  document.getElementById('alert-bar').textContent = alerts.length > 0 ? alerts.join('  |  ') : '경보 없음';
}

// Legend
function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = PHASE_NAMES.map((name, i) =>
    `<div class="legend-row"><div class="legend-dot" style="background:${PHASE_COLORS_HEX[i]}"></div><span>${name}</span></div>`
  ).join('');
}
buildLegend();

// ═══════════════════════════════════════════════════════
// Controls
// ═══════════════════════════════════════════════════════
document.getElementById('btn-start').addEventListener('click', () => { state.running = true; });
document.getElementById('btn-pause').addEventListener('click', () => { state.running = false; });
document.getElementById('btn-reset').addEventListener('click', () => {
  state.running = false;
  const n = parseInt(document.getElementById('slider-drones').value) || 30;
  resetSim(n);
  rebuildDroneMeshes();
  updateUI();
});

document.getElementById('slider-drones').addEventListener('input', e => {
  document.getElementById('drone-count-val').textContent = e.target.value;
});

document.getElementById('slider-speed').addEventListener('input', e => {
  state.speedMul = parseFloat(e.target.value);
  document.getElementById('speed-val').textContent = state.speedMul.toFixed(2);
});

document.getElementById('chk-wind').addEventListener('change', e => {
  state.wind = e.target.checked ? [2.0, -1.5, 0] : [0, 0, 0];
});

document.getElementById('sel-scenario').addEventListener('change', e => {
  const counts = { default: 30, high_density: 80, emergency: 40, mass_takeoff: 60, route_conflict: 20 };
  const n = counts[e.target.value] || 30;
  document.getElementById('slider-drones').value = n;
  document.getElementById('drone-count-val').textContent = n;
  state.running = false;
  resetSim(n);
  rebuildDroneMeshes();
  updateUI();
});

// ═══════════════════════════════════════════════════════
// Animation Loop
// ═══════════════════════════════════════════════════════
let lastTime = performance.now();
let uiTimer = 0;

function animate(now) {
  requestAnimationFrame(animate);
  const elapsed = (now - lastTime) / 1000;
  lastTime = now;

  if (state.running) {
    const spd = Math.max(0.25, state.speedMul);
    const steps = Math.max(1, Math.round(spd));
    for (let i = 0; i < steps; i++) simStep();
    updateDroneMeshes();
  }

  // Update UI every 200ms
  uiTimer += elapsed;
  if (uiTimer > 0.2) {
    updateUI();
    uiTimer = 0;
  }

  controls.update();
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════
resetSim(30);
rebuildDroneMeshes();
updateUI();
requestAnimationFrame(animate);

// Resize
window.addEventListener('resize', () => {
  const w = container.clientWidth, h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

</script>
</body>
